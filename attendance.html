<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課堂點名 — 班級教務系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#1a1a1a;--white:#fff;--gray50:#f8f8f8;--gray100:#f0f0f0;
  --gray200:#e8e8e8;--gray400:#aaa;--gray600:#666;--gray800:#333;
  --blue:#1a56c9;--blue-bg:#e8f0fe;--green:#1a7a3c;--green-bg:#e8f8ed;
  --red:#c0392b;--red-bg:#fef0f0;--orange:#a06600;--orange-bg:#fff8e6;
  --yellow:#856404;--yellow-bg:#fff3cd;--purple:#6b21a8;--purple-bg:#f3e8ff;
  --line:#06C755;--radius:10px;--radius-sm:6px;--shadow:0 2px 8px rgba(0,0,0,.08);
}
body{font-family:'Noto Sans TC',system-ui,sans-serif;font-size:14px;background:var(--gray100);color:var(--black);min-height:100vh}
.sys-header{background:var(--black);color:var(--white);padding:8px 16px;position:sticky;top:0;z-index:100}
.sys-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sys-logo{font-size:16px;font-weight:600;display:flex;align-items:center;gap:6px;color:var(--white)}
.sys-logo span{font-size:11px;opacity:.5;font-weight:400}
.nav-links{display:flex;gap:2px;flex-wrap:wrap}
.nav-a{color:rgba(255,255,255,.75);text-decoration:none;padding:5px 10px;border-radius:var(--radius-sm);font-size:12px;white-space:nowrap;display:flex;align-items:center;gap:3px}
.nav-a:hover,.nav-a.active{background:rgba(255,255,255,.15);color:#fff}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px}
.card{background:var(--white);border:1px solid var(--gray200);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.lbl{font-size:12px;color:var(--gray600);margin-bottom:4px;display:block;font-weight:500}
input[type=text],input[type=time],input[type=date],select,textarea{width:100%;padding:8px 11px;font-size:13px;border:1px solid var(--gray200);border-radius:var(--radius-sm);background:var(--white);color:var(--black);font-family:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--black)}
.row{display:flex;gap:8px;flex-wrap:wrap}.col{flex:1;min-width:110px}
.btn{padding:8px 16px;font-size:13px;border:1px solid var(--gray200);border-radius:var(--radius-sm);cursor:pointer;background:var(--white);color:var(--black);font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--gray50)}
.btn-p{background:var(--black);color:var(--white);border-color:var(--black)}.btn-p:hover{background:var(--gray800)}
.btn-ln{background:var(--line);color:var(--white);border-color:var(--line)}.btn-ln:hover{opacity:.88}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:#f5c6c6}
/* 出席狀態 badge */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;user-select:none;transition:all .15s;white-space:nowrap}
.b-present {background:var(--green-bg);color:var(--green)}
.b-absent  {background:var(--red-bg);color:var(--red)}
.b-late    {background:var(--orange-bg);color:var(--orange)}
.b-early   {background:var(--yellow-bg);color:var(--yellow)}
.b-sick    {background:#e8f0fe;color:#1a56c9}
.b-affair  {background:#f0fdf4;color:#166534}
.b-public  {background:#eff6ff;color:#1e40af}
.b-cram    {background:var(--purple-bg);color:var(--purple)}
.b-na      {background:var(--gray100);color:var(--gray400)}
.b-none    {background:var(--gray50);color:var(--gray400);border:1px dashed var(--gray200)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 11px;font-weight:500;border-bottom:1px solid var(--gray200);color:var(--gray600);font-size:12px;background:var(--gray50);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--gray100);vertical-align:middle}
tr:hover td{background:var(--gray50)}
tr:last-child td{border-bottom:none}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--gray200);margin-bottom:18px;overflow-x:auto}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--gray600);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-family:inherit}
.tab:hover{color:var(--black)}.tab.active{color:var(--black);border-bottom-color:var(--black);font-weight:600}
.pg{display:none}.pg.active{display:block}
.hint{font-size:12px;color:var(--gray600);line-height:1.8;padding:10px 13px;background:var(--gray50);border-radius:var(--radius-sm);margin-bottom:12px;border-left:3px solid var(--gray200)}
.log{font-size:11px;font-family:monospace;background:var(--gray50);border-radius:var(--radius-sm);padding:10px;max-height:150px;overflow-y:auto;line-height:1.8;border:1px solid var(--gray200);margin-top:8px}
.sep{height:1px;background:var(--gray100);margin:14px 0}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;background:var(--gray100);color:var(--gray600);margin:1px}
/* 點名列表 */
.att-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--gray200);border-radius:var(--radius-sm);margin-bottom:6px;background:var(--white);flex-wrap:wrap}
.att-row.absent{background:var(--red-bg);border-color:#f5c6c6}
.att-row.late{background:var(--orange-bg);border-color:#f5dfa0}
.att-row.na{background:var(--gray50);opacity:.6}
.att-name{font-weight:600;min-width:60px}
.att-seat{font-size:12px;color:var(--gray400);min-width:36px}
.status-btns{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.status-btn{padding:4px 10px;font-size:12px;border:1px solid var(--gray200);border-radius:20px;cursor:pointer;background:var(--white);font-family:inherit;transition:all .15s;white-space:nowrap}
.status-btn:hover{background:var(--gray100)}
.status-btn.active-present{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.status-btn.active-absent {background:var(--red-bg);color:var(--red);border-color:var(--red)}
.status-btn.active-late   {background:var(--orange-bg);color:var(--orange);border-color:var(--orange)}
.status-btn.active-early  {background:var(--yellow-bg);color:var(--yellow);border-color:#b8860b}
.status-btn.active-sick   {background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.status-btn.active-affair {background:#f0fdf4;color:#166534;border-color:#86efac}
.status-btn.active-public {background:#eff6ff;color:#1e40af;border-color:#93c5fd}
.status-btn.active-cram   {background:var(--purple-bg);color:var(--purple);border-color:#d8b4fe}
.status-btn.active-na     {background:var(--gray100);color:var(--gray600);border-color:var(--gray400)}
.time-input{width:80px;padding:3px 6px;font-size:12px;border:1px solid var(--gray200);border-radius:4px}
.note-input{flex:1;min-width:100px;padding:3px 8px;font-size:12px;border:1px solid var(--gray200);border-radius:4px}
/* 統計 */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:14px}
.stat-card{background:var(--white);border:1px solid var(--gray200);border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:700}.stat-lbl{font-size:11px;color:var(--gray600);margin-top:2px}
/* 登入 */
#loginOverlay{position:fixed;inset:0;background:#1a1a1a;z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:36px 40px;width:min(380px,90vw);text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.login-logo{font-size:40px;margin-bottom:12px}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:#666;margin-bottom:24px}
.login-input{width:100%;padding:12px 14px;font-size:16px;border:2px solid #e8e8e8;border-radius:10px;text-align:center;letter-spacing:4px;font-family:monospace;outline:none;margin-bottom:12px}
.login-input:focus{border-color:#1a1a1a}
.login-btn{width:100%;padding:13px;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;background:#1a1a1a;color:#fff;margin-bottom:10px}
.login-err{color:#c0392b;font-size:13px;min-height:20px}
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">✅</div>
    <div class="login-title">課堂點名</div>
    <div class="login-sub">Teacher Dashboard — 請輸入密碼</div>
    <input class="login-input" type="password" id="pwInput" placeholder="••••••••" maxlength="20" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">登入</button>
    <div class="login-err" id="pwErr"></div>
  </div>
</div>

<header class="sys-header">
  <div class="sys-header-top">
    <div class="sys-logo">✅ 課堂點名 <span>班級教務管理系統</span></div>
  </div>
  <nav class="nav-links">
    <a class="nav-a" href="index.html">🏠 首頁</a>
    <a class="nav-a" href="homework.html">📋 作業</a>
    <a class="nav-a active" href="attendance.html">✅ 點名</a>
    <a class="nav-a" href="academic.html">📊 學涯</a>
  </nav>
</header>

<div class="wrap">
<div class="tabs">
  <button class="tab active" onclick="goTab('roll',this)">📋 即時點名</button>
  <button class="tab" onclick="goTab('records',this)">📅 出缺席紀錄</button>
  <button class="tab" onclick="goTab('stats',this)">📊 統計分析</button>
  <button class="tab" onclick="goTab('notify',this)">📱 LINE 通知</button>
</div>

<!-- ══ 即時點名 ══ -->
<div id="tab-roll" class="pg active">
  <div class="card">
    <div class="row" style="gap:10px;align-items:flex-end;flex-wrap:wrap">
      <div class="col" style="min-width:130px">
        <span class="lbl">班級</span>
        <select id="rollCls" onchange="onClsChange()"><option value="">請選擇班級</option></select>
      </div>
      <div class="col" style="min-width:120px">
        <span class="lbl">日期</span>
        <input type="date" id="rollDate"/>
      </div>
      <div class="col" style="min-width:120px">
        <span class="lbl">節次</span>
        <select id="rollPeriod" onchange="onPeriodChange()"><option value="">請選擇節次</option></select>
      </div>
      <div class="col" style="min-width:90px">
        <span class="lbl">科目</span>
        <input type="text" id="rollSubject" placeholder="自然"/>
      </div>
      <div style="display:flex;align-items:flex-end;gap:6px">
        <button class="btn btn-p" onclick="startRoll()">開始點名</button>
        <button class="btn btn-sm" onclick="markAllPresent()" id="allPresentBtn" style="display:none">✓ 全到</button>
      </div>
    </div>
  </div>

  <div id="rollWrap" style="display:none">
    <!-- 快捷標記 -->
    <div class="card" style="padding:12px 16px">
      <div class="row" style="align-items:center;gap:8px;flex-wrap:wrap">
        <div style="font-size:13px;font-weight:600">快速標記：</div>
        <button class="btn btn-sm" style="background:var(--green-bg);color:var(--green);border-color:var(--green)" onclick="markAll('present')">✓ 全部出席</button>
        <button class="btn btn-sm" onclick="clearAll()">清除全部</button>
        <div style="flex:1"></div>
        <div id="rollSummary" style="font-size:12px;color:var(--gray600)"></div>
      </div>
    </div>

    <div id="rollList"></div>

    <div class="row" style="gap:8px;margin-top:10px">
      <button class="btn btn-p" onclick="saveRoll()" style="flex:1;padding:12px;font-size:14px">💾 儲存點名紀錄</button>
      <button class="btn btn-ln" onclick="notifyAbsent()" id="notifyBtn">📱 通知缺席家長</button>
    </div>
    <div id="rollLog" class="log" style="display:none"></div>
  </div>
</div>

<!-- ══ 出缺席紀錄 ══ -->
<div id="tab-records" class="pg">
  <div class="card">
    <div class="row" style="gap:8px;align-items:flex-end;flex-wrap:wrap">
      <div class="col">
        <span class="lbl">班級</span>
        <select id="recCls"><option value="">全部</option></select>
      </div>
      <div class="col">
        <span class="lbl">日期起</span>
        <input type="date" id="recFrom"/>
      </div>
      <div class="col">
        <span class="lbl">日期迄</span>
        <input type="date" id="recTo"/>
      </div>
      <div class="col">
        <span class="lbl">狀態篩選</span>
        <select id="recStatus">
          <option value="">全部</option>
          <option value="absent">曠課</option>
          <option value="late">遲到</option>
          <option value="early">早退</option>
          <option value="sick">病假</option>
          <option value="affair">事假</option>
          <option value="public">公假</option>
          <option value="cram">補習</option>
        </select>
      </div>
      <div style="display:flex;align-items:flex-end;gap:6px">
        <button class="btn btn-p" onclick="renderRecords()">查詢</button>
        <button class="btn btn-sm" onclick="exportRecords()">匯出CSV</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>日期</th><th>班級</th><th>節次</th><th>座號</th><th>姓名</th>
          <th>狀態</th><th>時間</th><th>備註</th><th>通知</th>
        </tr></thead>
        <tbody id="recBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ══ 統計分析 ══ -->
<div id="tab-stats" class="pg">
  <div class="card">
    <div class="row" style="gap:8px;align-items:flex-end;flex-wrap:wrap">
      <div class="col">
        <span class="lbl">班級</span>
        <select id="statCls"><option value="">全部</option></select>
      </div>
      <div class="col">
        <span class="lbl">統計月份（或留空=全部）</span>
        <input type="month" id="statMonth"/>
      </div>
      <button class="btn btn-p" style="align-self:flex-end" onclick="renderStats()">統計</button>
    </div>
  </div>
  <div id="statContent"></div>
</div>

<!-- ══ LINE 通知 ══ -->
<div id="tab-notify" class="pg">
  <div class="card">
    <div class="card-title">📱 LINE 通知設定</div>
    <div class="hint">
      <strong>自動通知規則：</strong><br>
      • 曠課 → 立即通知兩位家長<br>
      • 遲到超過5分鐘 → 通知兩位家長<br>
      • 病假/事假（學生轉達，非家長請假）→ 通知兩位家長確認<br>
      • 公假/補習 → 不自動通知
    </div>
    <div class="row" style="gap:8px;margin-bottom:12px">
      <div class="col">
        <span class="lbl">遲到通知門檻（分鐘）</span>
        <input type="number" id="lateThreshold" value="5" min="1" max="60" style="max-width:100px"/>
      </div>
    </div>
    <div class="hint">
      <strong>手動發送：</strong>選擇日期和班級，一鍵發送該日所有未通知家長
    </div>
    <div class="row" style="gap:8px;align-items:flex-end">
      <div class="col">
        <span class="lbl">日期</span>
        <input type="date" id="notifyDate"/>
      </div>
      <div class="col">
        <span class="lbl">班級</span>
        <select id="notifyCls"><option value="">全部</option></select>
      </div>
      <button class="btn btn-ln" onclick="sendPendingNotify()">📱 發送未通知的紀錄</button>
    </div>
    <div id="notifyLog" class="log" style="display:none"></div>
  </div>
</div>

</div><!-- /wrap -->

<script>
// ══════════════════════════════════════════════
//  全域狀態
// ══════════════════════════════════════════════
var GS={};
try{var _d=localStorage.getItem('eduSys');if(_d)GS=JSON.parse(_d);}catch(e){}
GS.attendance=GS.attendance||[]; // [{id,cls,date,period,subject,records:[{studentId,seat,name,status,time,note,notified}]}]
function save(){try{localStorage.setItem('eduSys',JSON.stringify(GS));}catch(e){}}

// ── 節次定義 ──
var PERIODS_NORMAL = [
  {id:'morning',label:'早自習'},
  {id:'p1',label:'第1節'},{id:'p2',label:'第2節'},
  {id:'p3',label:'第3節'},{id:'p4',label:'第4節'},
  {id:'lunch',label:'午休'},
  {id:'p5',label:'第5節'},{id:'p6',label:'第6節'},
  {id:'p7',label:'第7節'},{id:'p8',label:'第8節'}
];
var PERIODS_CLUB_G3 = [ // 三年級菁英班額外節次
  {id:'p9',label:'第9節'},
  {id:'dinner',label:'晚餐'},
  {id:'eve1',label:'晚自習1'},
  {id:'eve2',label:'晚自習2'},
  {id:'sleep',label:'晚睡'}
];
var PERIODS_SAT = [ // 週六（菁英班 1~3 年級）
  {id:'sat1',label:'週六第1節'},{id:'sat2',label:'週六第2節'},
  {id:'sat3',label:'週六第3節'},{id:'sat4',label:'週六第4節'}
];

// ── 出席狀態定義 ──
var STATUSES = [
  {id:'present', label:'出席',  cls:'active-present'},
  {id:'absent',  label:'缺席',  cls:'active-absent'},
  {id:'late',    label:'遲到',  cls:'active-late',   hasTime:true},
  {id:'early',   label:'早退',  cls:'active-early',  hasTime:true},
  {id:'sick',    label:'病假',  cls:'active-sick'},
  {id:'affair',  label:'事假',  cls:'active-affair'},
  {id:'public',  label:'公假',  cls:'active-public'},
  {id:'cram',    label:'補習',  cls:'active-cram'},
  {id:'na',      label:'未參加',cls:'active-na'}
];
var STATUS_MAP={};
STATUSES.forEach(function(s){STATUS_MAP[s.id]=s;});

// 需要通知家長的狀態
var NOTIFY_STATUSES=['absent','late','sick','affair'];

// 當前點名
var _rollData=[]; // [{studentId,seat,name,status,time,note}]
var _rollCls='';var _rollDate='';var _rollPeriod='';var _rollSubject='';

// ══════════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════════
(function init(){
  // 今天日期
  var today=new Date();
  var ymd=today.toISOString().split('T')[0];
  document.getElementById('rollDate').value=ymd;
  document.getElementById('notifyDate').value=ymd;
  document.getElementById('recFrom').value=ymd.substring(0,7)+'-01';
  document.getElementById('recTo').value=ymd;
  // 填入班級選單
  buildClsSels();
})();

function buildClsSels(){
  var myCls=getMyCls();
  var allCls=myCls.length?myCls:
    Array.from(new Set((GS.students||[]).filter(function(s){return s.status!=='graduated';}).map(function(s){return s.class_name;}).filter(Boolean))).sort();

  ['rollCls','recCls','statCls','notifyCls'].forEach(function(elId){
    var sel=document.getElementById(elId);
    if(!sel)return;
    var first=sel.options[0].text;
    sel.innerHTML='<option value="">'+first+'</option>';
    allCls.forEach(function(c){
      var o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);
    });
  });
}

function getMyCls(){
  var cls=(GS.cfg&&GS.cfg.myCls)||[];
  var hr=GS.cfg&&GS.cfg.myHomeroom;if(hr&&cls.indexOf(hr)<0)cls=cls.concat([hr]);
  (GS.cfg&&GS.cfg.myClubs||[]).forEach(function(cid){
    var c=GS.clubs&&GS.clubs.find(function(x){return x.id===cid;});
    if(c&&cls.indexOf(c.name)<0)cls=cls.concat([c.name]);
  });
  return cls;
}

function isClub(cls){
  return !!(GS.clubs||[]).find(function(c){return c.name===cls;});
}
function getClubGrade(cls){
  // 從社團名稱推算年級（117級=現一年級等）
  // 假設社團名稱包含年級資訊，或從成員的班級推算
  var members=getStudentsOfCls(cls);
  if(!members.length) return 0;
  var grades=members.map(function(s){return parseInt(String(s.class_name).charAt(0))||0;}).filter(Boolean);
  if(!grades.length) return 0;
  return Math.max.apply(null,grades);
}

function onClsChange(){
  var cls=document.getElementById('rollCls').value;
  var date=document.getElementById('rollDate').value;
  buildPeriodSel(cls, date);
}
function onPeriodChange(){}

function buildPeriodSel(cls, dateStr){
  var sel=document.getElementById('rollPeriod');
  sel.innerHTML='<option value="">請選擇節次</option>';
  var periods=getPeriods(cls, dateStr);
  periods.forEach(function(p){
    var o=document.createElement('option');o.value=p.id;o.textContent=p.label;sel.appendChild(o);
  });
}

function getPeriods(cls, dateStr){
  var periods=PERIODS_NORMAL.slice();
  if(isClub(cls)){
    var grade=getClubGrade(cls);
    // 週六節次（1~3年級菁英班）
    var date=dateStr?new Date(dateStr):new Date();
    var isSat=date.getDay()===6;
    if(isSat) return PERIODS_SAT;
    // 三年級菁英班加晚間節次
    if(grade>=3) periods=periods.concat(PERIODS_CLUB_G3);
  }
  return periods;
}

function getStudentsOfCls(cls){
  if(!cls) return [];
  var clubDef=(GS.clubs||[]).find(function(c){return c.name===cls;});
  if(clubDef){
    // 社團：取成員（可能有「未參加」標記）
    var memberIds=clubDef.memberIds||[];
    return (GS.students||[]).filter(function(s){
      return s.status!=='graduated'&&memberIds.indexOf(s.student_id||s.student_name)>=0;
    }).map(function(s){return Object.assign({},s,{isClubMember:true});});
  }
  return (GS.students||[]).filter(function(s){
    return s.status!=='graduated'&&s.class_name===cls;
  });
}

function goTab(id,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});

// ══════════════════════════════════════════════
//  即時點名
// ══════════════════════════════════════════════
function startRoll(){
  var cls=document.getElementById('rollCls').value;
  var date=document.getElementById('rollDate').value;
  var period=document.getElementById('rollPeriod').value;
  var subject=document.getElementById('rollSubject').value.trim()||(GS.cfg&&GS.cfg.subject)||'';
  if(!cls||!date||!period){alert('請選擇班級、日期和節次');return;}

  _rollCls=cls; _rollDate=date; _rollPeriod=period; _rollSubject=subject;

  // 讀取已有紀錄
  var existing=GS.attendance.find(function(a){
    return a.cls===cls&&a.date===date&&a.period===period;
  });

  var students=getStudentsOfCls(cls);
  _rollData=students.map(function(s){
    var key=s.student_id||s.student_name;
    var prev=existing&&existing.records.find(function(r){return r.studentId===key;});
    return{
      studentId:key, seat:s.seat_number, name:s.student_name,
      parent1LineId:s.parent1_line_id||'', parent1Name:s.parent1_name||'',
      parent2LineId:s.parent2_line_id||'', parent2Name:s.parent2_name||'',
      status:prev?prev.status:'', time:prev?prev.time:'', note:prev?prev.note:'',
      notified:prev?prev.notified:false
    };
  });

  document.getElementById('rollWrap').style.display='block';
  document.getElementById('allPresentBtn').style.display='inline-flex';
  renderRollList();
}

function renderRollList(){
  var html=_rollData.map(function(r,i){
    var s=STATUS_MAP[r.status];
    var rowCls=r.status==='absent'?'absent':r.status==='late'?'late':r.status==='na'?'na':'';
    var btns=STATUSES.map(function(st){
      var active=r.status===st.id?'active-'+st.id:'';
      return'<button class="status-btn '+active+'" onclick="setStatus('+i+',\''+st.id+'\')">'
        +st.label+'</button>';
    }).join('');

    var extra='';
    if(r.status==='late'||r.status==='early'){
      extra='<input class="time-input" type="time" value="'+(r.time||'')+'" onchange="setTime('+i+',this.value)" placeholder="時:分"/>';
    }
    if(r.status&&r.status!=='present'&&r.status!=='na'){
      extra+='<input class="note-input" type="text" value="'+(r.note||'')+'" onchange="setNote('+i+',this.value)" placeholder="備註（選填）"/>';
    }

    return'<div class="att-row '+rowCls+'" id="attrow'+i+'">'
      +'<div class="att-seat">'+r.seat+'</div>'
      +'<div class="att-name">'+r.name+'</div>'
      +'<div class="status-btns">'+btns+'</div>'
      +(extra?'<div style="display:flex;gap:4px;width:100%;margin-top:4px">'+extra+'</div>':'')
    +'</div>';
  }).join('');
  document.getElementById('rollList').innerHTML=html||'<div style="padding:20px;text-align:center;color:var(--gray400)">無學生資料</div>';
  updateSummary();
}

function setStatus(i,status){
  _rollData[i].status=status;
  if(status==='present'||status==='na'){
    _rollData[i].time='';_rollData[i].note='';
  } else if((status==='late'||status==='early')&&!_rollData[i].time){
    // 自動帶入目前時間
    var now=new Date();
    _rollData[i].time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  }
  renderRollList();
  var el=document.getElementById('attrow'+i);
  if(el)el.scrollIntoView({block:'nearest'});
}
function setTime(i,v){_rollData[i].time=v;}
function setNote(i,v){_rollData[i].note=v;}
function markAll(status){_rollData.forEach(function(r){if(r.status!=='na')r.status=status;});renderRollList();}
function markAllPresent(){markAll('present');}
function clearAll(){_rollData.forEach(function(r){r.status='';});renderRollList();}

function updateSummary(){
  var cnt={present:0,absent:0,late:0,early:0,sick:0,affair:0,public:0,cram:0,na:0,none:0};
  _rollData.forEach(function(r){cnt[r.status||'none']=(cnt[r.status||'none']||0)+1;});
  document.getElementById('rollSummary').innerHTML=
    '出席 <strong>'+cnt.present+'</strong> · '
    +'曠課 <strong style="color:var(--red)">'+cnt.absent+'</strong> · '
    +'遲到 <strong style="color:var(--orange)">'+cnt.late+'</strong> · '
    +'病假 '+cnt.sick+' · 事假 '+cnt.affair+' · 補習 '+cnt.cram+' · 未標記 '+cnt.none;
}

function saveRoll(){
  var existing=GS.attendance.findIndex(function(a){
    return a.cls===_rollCls&&a.date===_rollDate&&a.period===_rollPeriod;
  });
  var rec={
    id:'att_'+Date.now(), cls:_rollCls, date:_rollDate,
    period:_rollPeriod, subject:_rollSubject,
    savedAt:new Date().toLocaleString('zh-TW'),
    records:_rollData.map(function(r){return{
      studentId:r.studentId, seat:r.seat, name:r.name,
      status:r.status||'', time:r.time||'', note:r.note||'',
      notified:r.notified||false,
      parent1LineId:r.parent1LineId, parent1Name:r.parent1Name,
      parent2LineId:r.parent2LineId, parent2Name:r.parent2Name
    };})
  };
  if(existing>=0)GS.attendance[existing]=rec;
  else GS.attendance.push(rec);
  save();
  alert('✓ 點名紀錄已儲存！');

  // 自動通知
  autoNotify(rec);
}

// ══════════════════════════════════════════════
//  自動通知邏輯
// ══════════════════════════════════════════════
async function autoNotify(rec){
  var log=document.getElementById('rollLog');
  log.style.display='block';
  function add(m){log.textContent+=m+'\n';log.scrollTop=log.scrollHeight;}

  var threshold=parseInt(document.getElementById('lateThreshold').value)||5;
  var toNotify=rec.records.filter(function(r){
    if(r.notified)return false;
    if(r.status==='absent')return true;
    if(r.status==='sick'||r.status==='affair')return true;
    if(r.status==='late'&&r.time){
      // 計算遲到分鐘數（跟正常上課時間比）
      return true; // 簡化：有遲到時間就通知
    }
    return false;
  });

  if(!toNotify.length){add('無需通知的缺席紀錄');return;}

  var periodLabel=getPeriodLabel(_rollPeriod);
  var tk=GS.line&&GS.line.token;
  var wu=(GS.line&&GS.line.workerUrl||'').replace(/\/$/,'');
  if(!tk||!wu){add('⚠ 請先設定 LINE Token 和 Worker 網址');return;}

  for(var i=0;i<toNotify.length;i++){
    var r=toNotify[i];
    var statusLabel=STATUS_MAP[r.status]?STATUS_MAP[r.status].label:r.status;
    var msg='【出缺席通知】\n'
      +_rollDate+' '+periodLabel+'\n'
      +_rollCls+' '+r.seat+'號 '+r.name+'\n'
      +'狀態：'+statusLabel
      +(r.time?'（'+r.time+'）':'')
      +(r.note?'\n備註：'+r.note:'')+'\n'
      +(r.status==='sick'||r.status==='affair'?'⚠ 請確認孩子狀況是否正確\n':'')
      +'如有疑問請聯繫老師。';

    var sent=false;
    if(r.parent1LineId){
      var ok=await linePush(wu,tk,r.parent1LineId,msg);
      add((ok?'✓':'✗')+' 通知 '+r.name+' '+r.parent1Name);
      if(ok)sent=true;
    }
    if(r.parent2LineId){
      var ok2=await linePush(wu,tk,r.parent2LineId,msg);
      add((ok2?'✓':'✗')+' 通知 '+r.name+' '+r.parent2Name);
    }
    if(sent){
      // 更新通知狀態
      var attIdx=GS.attendance.findIndex(function(a){return a.cls===_rollCls&&a.date===_rollDate&&a.period===_rollPeriod;});
      if(attIdx>=0){
        var rIdx=GS.attendance[attIdx].records.findIndex(function(x){return x.studentId===r.studentId;});
        if(rIdx>=0)GS.attendance[attIdx].records[rIdx].notified=true;
      }
    }
    if(i<toNotify.length-1)await sleep(500);
  }
  save();
  add('✅ 通知完成');
}

async function notifyAbsent(){
  var rec=GS.attendance.find(function(a){
    return a.cls===_rollCls&&a.date===_rollDate&&a.period===_rollPeriod;
  });
  if(rec)await autoNotify(rec);
}

async function sendPendingNotify(){
  var log=document.getElementById('notifyLog');
  log.style.display='block';log.textContent='';
  function add(m){log.textContent+=m+'\n';log.scrollTop=log.scrollHeight;}
  var date=document.getElementById('notifyDate').value;
  var cls=document.getElementById('notifyCls').value;
  var tk=GS.line&&GS.line.token;
  var wu=(GS.line&&GS.line.workerUrl||'').replace(/\/$/,'');
  if(!tk||!wu){add('⚠ 請先設定 LINE Token 和 Worker 網址');return;}

  var recs=GS.attendance.filter(function(a){
    return a.date===date&&(!cls||a.cls===cls);
  });
  var count=0;
  for(var i=0;i<recs.length;i++){
    var rec=recs[i];
    var needNotify=rec.records.filter(function(r){
      return !r.notified&&NOTIFY_STATUSES.indexOf(r.status)>=0;
    });
    if(needNotify.length){
      await autoNotify(rec);
      count+=needNotify.length;
    }
  }
  add('共發送 '+count+' 筆通知');
}

async function linePush(wu,tk,uid,msg){
  try{
    var r=await fetch(wu+'/push',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:tk,to:uid,message:msg})});
    var d=await r.json();return d.ok!==false;
  }catch(e){return false;}
}
function sleep(ms){return new Promise(function(res){setTimeout(res,ms);});}

// ══════════════════════════════════════════════
//  出缺席紀錄
// ══════════════════════════════════════════════
function renderRecords(){
  var cls=document.getElementById('recCls').value;
  var from=document.getElementById('recFrom').value;
  var to=document.getElementById('recTo').value;
  var statusF=document.getElementById('recStatus').value;

  var rows=[];
  GS.attendance.forEach(function(a){
    if(cls&&a.cls!==cls)return;
    if(from&&a.date<from)return;
    if(to&&a.date>to)return;
    var periodLabel=getPeriodLabel(a.period);
    a.records.forEach(function(r){
      if(!r.status||r.status==='present')return;
      if(statusF&&r.status!==statusF)return;
      rows.push({date:a.date,cls:a.cls,period:periodLabel,seat:r.seat,name:r.name,
        status:r.status,time:r.time,note:r.note,notified:r.notified});
    });
  });
  rows.sort(function(a,b){return b.date.localeCompare(a.date)||a.cls.localeCompare(b.cls);});

  document.getElementById('recBody').innerHTML=rows.map(function(r){
    var s=STATUS_MAP[r.status];
    var badge=s?'<span class="badge b-'+r.status+'">'+s.label+'</span>':'<span class="badge b-none">'+r.status+'</span>';
    return'<tr>'
      +'<td>'+r.date+'</td><td>'+r.cls+'</td><td>'+r.period+'</td>'
      +'<td>'+r.seat+'</td><td><strong>'+r.name+'</strong></td>'
      +'<td>'+badge+'</td>'
      +'<td>'+(r.time||'--')+'</td>'
      +'<td>'+(r.note||'--')+'</td>'
      +'<td>'+(r.notified?'<span style="color:var(--green);font-size:12px">✓ 已通知</span>':'<span style="color:var(--gray400);font-size:12px">--</span>')+'</td>'
    +'</tr>';
  }).join('')||'<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--gray400)">無紀錄</td></tr>';
}

function exportRecords(){
  var rows=[['日期','班級','節次','座號','姓名','狀態','時間','備註','已通知']];
  GS.attendance.forEach(function(a){
    a.records.forEach(function(r){
      if(!r.status||r.status==='present')return;
      rows.push([a.date,a.cls,getPeriodLabel(a.period),r.seat,r.name,
        STATUS_MAP[r.status]?STATUS_MAP[r.status].label:r.status,
        r.time||'',r.note||'',r.notified?'是':'否']);
    });
  });
  dlCSV(rows,'出缺席紀錄_'+new Date().toLocaleDateString('zh-TW').replace(/\//g,'-'));
}

// ══════════════════════════════════════════════
//  統計分析
// ══════════════════════════════════════════════
function renderStats(){
  var cls=document.getElementById('statCls').value;
  var month=document.getElementById('statMonth').value;

  var stuMap={};
  GS.attendance.forEach(function(a){
    if(cls&&a.cls!==cls)return;
    if(month&&!a.date.startsWith(month))return;
    a.records.forEach(function(r){
      if(!r.status||r.status==='present'||r.status==='na')return;
      var key=r.name+'_'+a.cls;
      if(!stuMap[key])stuMap[key]={name:r.name,cls:a.cls,seat:r.seat,
        absent:0,late:0,early:0,sick:0,affair:0,public:0,cram:0,total:0};
      var s=stuMap[key];
      s[r.status]=(s[r.status]||0)+1;
      s.total++;
    });
  });

  var stus=Object.values(stuMap).sort(function(a,b){return b.absent-a.absent||b.total-a.total;});
  if(!stus.length){
    document.getElementById('statContent').innerHTML='<div class="card" style="text-align:center;padding:30px;color:var(--gray400)">無統計資料</div>';
    return;
  }

  var html='<div class="card"><div style="overflow-x:auto"><table>'
    +'<thead><tr><th>班級</th><th>座號</th><th>姓名</th>'
    +'<th style="color:var(--red)">曠課</th><th style="color:var(--orange)">遲到</th>'
    +'<th style="color:var(--yellow)">早退</th><th style="color:var(--blue)">病假</th>'
    +'<th>事假</th><th>公假</th><th style="color:var(--purple)">補習</th><th>合計</th></tr></thead><tbody>';
  stus.forEach(function(s){
    html+='<tr>'
      +'<td>'+s.cls+'</td><td>'+s.seat+'</td><td><strong>'+s.name+'</strong></td>'
      +'<td style="text-align:center;color:var(--red);font-weight:600">'+(s.absent||0)+'</td>'
      +'<td style="text-align:center;color:var(--orange)">'+(s.late||0)+'</td>'
      +'<td style="text-align:center">'+(s.early||0)+'</td>'
      +'<td style="text-align:center">'+(s.sick||0)+'</td>'
      +'<td style="text-align:center">'+(s.affair||0)+'</td>'
      +'<td style="text-align:center">'+(s.public||0)+'</td>'
      +'<td style="text-align:center;color:var(--purple)">'+(s.cram||0)+'</td>'
      +'<td style="text-align:center;font-weight:600">'+s.total+'</td>'
    +'</tr>';
  });
  html+='</tbody></table></div></div>';
  document.getElementById('statContent').innerHTML=html;
}

// ══════════════════════════════════════════════
//  工具
// ══════════════════════════════════════════════
function getPeriodLabel(pid){
  var allP=PERIODS_NORMAL.concat(PERIODS_CLUB_G3).concat(PERIODS_SAT);
  var p=allP.find(function(x){return x.id===pid;});
  return p?p.label:pid;
}
function dlCSV(rows,name){
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+rows.map(function(r){return r.map(function(c){return'"'+(c||'').toString().replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  a.download=name+'.csv';a.click();
}
