<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>跨宇宙探險：數據大師版 🌌</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5cb85c">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            /* 🌟 更新為 webp 格式 */
            --bg-image: url('grass.webp');
            --bg-fallback: linear-gradient(135deg, #4e342e 0%, #1b5e20 100%);
            --ui-color: #2e7d32;
            --hole-bg: rgba(0, 0, 0, 0.4);
            --mole-img: url('https://api.iconify.design/fluent-emoji/hamster.svg');
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            text-align: center; margin: 0; padding: env(safe-area-inset-top) 20px 20px 20px; 
            background-color: #2e7d32;
            background-image: var(--bg-image), var(--bg-fallback); 
            background-size: cover; background-position: center; background-attachment: fixed; 
            background-repeat: no-repeat;
            overflow-x: hidden; transition: background-image 0.5s ease; 
        }
        
        .top-section {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;
            max-width: 950px; margin: 0 auto 20px auto;
        }
        .left-column, .right-column {
            display: flex; flex-direction: column; gap: 15px; align-items: center;
            width: 100%; max-width: 420px;
        }

        h1 { color: #333; background: rgba(255, 255, 255, 0.95); display: inline-block; padding: 12px 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin: 0 0 20px 0; font-size: 26px; font-weight: bold; border: 2px solid var(--ui-color); transition: 0.3s;}
        
        .info-panel { background: rgba(255, 255, 255, 0.95); padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 90%; color: var(--ui-color); font-weight: bold; box-sizing: border-box;}
        .info-panel span { color: #d9534f; font-size: 22px; }
        .challenge-info { font-size: 16px; color: #5cb85c; margin-top: 5px; font-weight: normal; }

        .world-leaderboard { 
            background: rgba(255, 255, 255, 0.95); border: 3px solid var(--ui-color); 
            border-radius: 15px; padding: 10px 20px; width: 90%; height: 180px; 
            overflow-y: auto; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
            box-sizing: border-box;
        }
        
        .rules-panel { background: rgba(255, 255, 255, 0.95); border: 3px solid var(--ui-color); border-radius: 15px; padding: 15px; width: 90%; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.3); color: #333; font-weight: bold; box-sizing: border-box;}
        .rules-panel h3 { margin: 0 0 10px 0; color: var(--ui-color); border-bottom: 2px dashed #ccc; padding-bottom: 5px; text-align: center; font-size: 18px;}
        .rules-panel p { margin: 5px 0; font-size: 15px; display: flex; justify-content: space-between;}

        .controls { 
            background: rgba(255, 255, 255, 0.95); padding: 15px 25px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 90%; color: var(--ui-color); 
            font-weight: bold; box-sizing: border-box; height: 180px; 
            display: flex; flex-direction: column; justify-content: center;
        }

        .difficulty-panel { margin-bottom: 12px; display: flex; justify-content: center; gap: 10px; }
        input[type="text"] { padding: 8px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; width: 100px; text-align: center; }
        
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin: 4px; transition: 0.2s; font-weight: bold; color: white; }
        #startBtn { background-color: var(--ui-color); }

        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 350px; margin: 20px auto; min-height: 350px;}
        .hole { aspect-ratio: 1/1; background: var(--hole-bg); border-radius: 50%; position: relative; overflow: hidden; box-shadow: inset 0 15px 25px rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.1); }
        .mole { width: 80%; height: 80%; position: absolute; left: 10%; bottom: -100%; transition: bottom 0.1s ease-out; background-image: var(--mole-img); background-size: 70% 70%; background-repeat: no-repeat; background-position: center 10px; }
        .mole.king::before { content: '👑'; position: absolute; top: -22px; left: 20%; font-size: 24px; }
        .mole.bomb { background-image: url('https://api.iconify.design/fluent-emoji/bomb.svg') !important; }
        .hole.up .mole { bottom: 0; }

        #resultModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-width: 340px; }
        #resultModal.show { display: flex; }
    </style>
</head>
<body>

    <div style="width: 100%; text-align: center;">
        <h1 id="mainTitle">跨宇宙打地鼠 🪐</h1>
    </div>

    <div class="top-section">
        <div class="left-column">
            <div class="info-panel">
                <div>分數: <span id="scoreDisplay">0</span> | 時間: <span id="timeDisplay">30</span> | 🔥 連擊: <span id="comboDisplay">0</span></div>
                <div class="challenge-info">目標：打爆 <span id="goalScoreDisplay">35</span> 分</div>
            </div>
            <div class="world-leaderboard">
                <h3>🏆 <span id="currentLevelName">草原區</span> Top 10</h3>
                <ol id="leaderboardList" style="margin:10px 0; padding-left:25px;"><li>載入中...</li></ol>
            </div>
        </div>

        <div class="right-column">
            <div class="rules-panel">
                <h3>📜 遊戲規則</h3>
                <p><span>🎯 一般擊中：</span> <span><b style="color:#2e7d32;">+1</b> 分</span></p>
                <p><span>👑 國王擊中：</span> <span><b style="color:#007bff;">+3</b> 分</span></p>
                <p><span>💣 誤觸炸彈：</span> <span><b style="color:#d9534f;">-5</b> 分</span></p>
            </div>
            <div class="controls">
                <div class="difficulty-panel">
                    <label><input type="radio" name="difficulty" value="easy" checked> 草原區</label>
                    <label><input type="radio" name="difficulty" value="medium"> 南極區</label>
                    <label><input type="radio" name="difficulty" value="hell"> 星際區</label>
                </div>
                <div style="display: flex; justify-content: center; gap: 5px;">
                    <input type="text" id="playerName" placeholder="獵人姓名" value="">
                    <button id="startBtn" onclick="toggleGame()">開始探索</button>
                </div>
                <button id="musicBtn" onclick="toggleMusic()" style="background-color:#5bc0de; margin-top:10px;">🔇 音效與音樂: 關</button>
            </div>
        </div>
    </div>

    <div id="resultModal">
        <div class="modal-content">
            <h2 style="margin:0; color:#2e7d32;">🚀 探索結束 🚀</h2>
            <div id="challengeResult" style="margin:10px 0; font-weight:bold;"></div>
            <div style="background:#f8f9fa; border-radius:12px; padding:15px; margin:15px 0; text-align:left;">
                <p>🎯 一般擊中：<span id="statNormal">0</span></p>
                <p>👑 國王擊中：<span id="statKing">0</span></p>
                <p>💣 誤觸炸彈：<span id="statBomb">0</span></p>
                <p style="font-size:24px; color:#d9534f; border-top:1px dashed #ccc; padding-top:10px;">總得分：<span id="modalScore">0</span></p>
            </div>
            <button onclick="location.reload()" style="background:#5cb85c; padding:12px; width:100%; border-radius:10px; color:white; font-weight:bold; cursor:pointer; border:none;">再來一局</button>
        </div>
    </div>

    <audio id="bgMusic" loop></audio>
    <audio id="bombSound" src="https://actions.google.com/sounds/v1/weapons/explosion_distant.ogg"></audio>

    <div class="board">
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
    </div>
