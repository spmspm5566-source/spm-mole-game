<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>跨宇宙探險：數據大師版 🌌</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5cb85c">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            /* 🌟 修正：換回最穩定且允許引用的高畫質吉普車草原 */
            --bg-image: url('https://images.unsplash.com/photo-1547471080-7cb2cb6a5a36?q=80&w=1920&auto=format&fit=crop');
            --bg-color: #4a2e15;
            --ui-color: #2e7d32;
            --hole-bg: rgba(20, 60, 20, 0.8);
            --mole-img: url('https://api.iconify.design/fluent-emoji/hamster.svg');
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            text-align: center; margin: 0; padding: env(safe-area-inset-top) 20px 20px 20px; 
            background-color: var(--bg-color); 
            background-image: var(--bg-image); 
            background-size: cover; background-position: center; background-attachment: fixed; 
            background-repeat: no-repeat;
            overflow-x: hidden; transition: background-image 0.5s ease; 
        }
        
        .top-section {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;
            max-width: 950px; margin: 0 auto 20px auto;
        }
        .left-column, .right-column {
            display: flex; flex-direction: column; gap: 15px; align-items: center;
            width: 100%; max-width: 420px;
        }

        h1 { color: #333; background: rgba(255, 255, 255, 0.95); display: inline-block; padding: 12px 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin: 0; font-size: 26px; font-weight: bold; border: 2px solid var(--ui-color); transition: 0.3s;}
        
        .rules-panel { background: rgba(255, 255, 255, 0.95); border: 3px solid var(--ui-color); border-radius: 15px; padding: 15px; width: 90%; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.3); color: #333; font-weight: bold; box-sizing: border-box;}
        .rules-panel h3 { margin: 0 0 10px 0; color: var(--ui-color); border-bottom: 2px dashed #ccc; padding-bottom: 5px; text-align: center; font-size: 18px;}
        .rules-panel p { margin: 5px 0; font-size: 15px; display: flex; justify-content: space-between;}
        
        .world-leaderboard { background: rgba(255, 255, 255, 0.95); border: 3px solid var(--ui-color); border-radius: 15px; padding: 10px 20px; width: 90%; max-height: 180px; overflow-y: auto; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.3); box-sizing: border-box;}
        .world-leaderboard h3 { margin: 0 0 10px 0; text-align: center; color: var(--ui-color); position: sticky; top: 0; background: rgba(255,255,255,0.95); z-index: 10; font-size: 18px;}
        
        .info-panel, .controls { background: rgba(255, 255, 255, 0.95); padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 90%; color: var(--ui-color); font-weight: bold; box-sizing: border-box;}
        .info-panel span { color: #d9534f; font-size: 22px; }
        
        .challenge-info { font-size: 16px; color: #5cb85c; margin-top: 5px; font-weight: normal; }

        .difficulty-panel { margin-bottom: 12px; display: flex; justify-content: center; gap: 10px; }
        input[type="text"] { padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; width: 100px; text-align: center; outline: none;}
        
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin: 4px; transition: 0.2s; font-weight: bold; color: white; }
        #startBtn { background-color: var(--ui-color); }
        #startBtn.pausing { background-color: #f0ad4e !important; }

        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 350px; margin: 10px auto; }
        
        .hole { aspect-ratio: 1/1; background: var(--hole-bg); border-radius: 50%; position: relative; overflow: hidden; box-shadow: inset 0 15px 25px rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.1); }
        
        .mole { width: 80%; height: 80%; position: absolute; left: 10%; bottom: -100%; transition: bottom 0.1s ease-out; background-image: var(--mole-img); background-size: 70% 70%; background-repeat: no-repeat; background-position: center 10px; }
        .mole.king::before { content: '👑'; position: absolute; top: -22px; left: 20%; font-size: 24px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);}
        .mole.bomb { background-image: url('https://api.iconify.design/fluent-emoji/bomb.svg') !important; }
        .hole.up .mole { bottom: 0; }

        #resultModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid var(--ui-color); }
        #resultModal.show { display: flex; }
        
        .stats-box { background: #f8f9fa; border-radius: 12px; padding: 15px; margin: 15px 0; text-align: left; border: 1px solid #dee2e6; }
        .stats-box p { margin: 8px 0; font-size: 16px; color: #495057; display: flex; justify-content: space-between; font-weight: bold; }
        .stats-box .total-score { color: #d9534f; font-size: 24px; border-top: 2px dashed #ccc; padding-top: 10px; margin-top: 10px; }
        
        .game-footer { margin-top: 20px; color: white; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; display: inline-block; font-size: 12px;}
    </style>
</head>
<body>

    <div class="top-section">
        <div class="left-column">
            <h1 id="mainTitle">跨宇宙打地鼠 🪐</h1>
            
            <div class="rules-panel">
                <h3>📜 遊戲規則</h3>
                <p><span>🎯 一般擊中：</span> <span><b style="color:#2e7d32;">+1</b> 分</span></p>
                <p><span>👑 國王擊中：</span> <span><b style="color:#007bff;">+3</b> 分</span></p>
                <p><span>💣 誤觸炸彈：</span> <span><b style="color:#d9534f;">-5</b> 分</span></p>
            </div>

            <div class="world-leaderboard">
                <h3>🏆 <span id="currentLevelName">草原區</span> Top 10</h3>
                <ol id="leaderboardList" style="margin:10px 0; padding-left:25px;"><li>訊號連接中...</li></ol>
            </div>
        </div>

        <div class="right-column">
            <div class="info-panel">
                <div>分數: <span id="scoreDisplay">0</span> | 時間: <span id="timeDisplay">30</span> | 🔥 連擊: <span id="comboDisplay">0</span></div>
                <div class="challenge-info">目標：打爆 <span id="goalScoreDisplay">10</span> 分</div>
            </div>

            <div class="controls">
                <div class="difficulty-panel">
                    <label><input type="radio" name="difficulty" value="easy" checked> 草原區</label>
                    <label><input type="radio" name="difficulty" value="medium"> 南極區</label>
                    <label><input type="radio" name="difficulty" value="hell"> 星際區</label>
                </div>
                <input type="text" id="playerName" placeholder="獵人姓名" value="">
                <button id="startBtn" onclick="toggleGame()">開始探索</button>
                <button id="musicBtn" onclick="toggleMusic()" style="background-color:#5bc0de;">🔇 音效與音樂: 關</button>
            </div>
        </div>
    </div>

    <div id="resultModal">
        <div class="modal-content">
            <h2 style="margin:0; color:var(--ui-color);">🚀 探索結束 🚀</h2>
            <p id="challengeResult" style="margin:10px 0; font-weight:bold;"></p>
            <div class="stats-box">
                <p>🎯 一般擊中：<span id="statNormal">0</span></p>
                <p>👑 國王擊中：<span id="statKing">0</span></p>
                <p>💣 誤觸炸彈：<span id="statBomb">0</span></p>
                <p class="total-score">總得分：<span id="modalScore">0</span></p>
            </div>
            <div id="rankBadge" style="background:#e3f2fd; padding:10px; border-radius:12px; margin-bottom:15px; font-weight:bold; color:#004a7c;">
                🌍 全球排名：第 <span id="modalRank">?</span> 名
            </div>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <button onclick="closeModalRestart()" style="background:#5cb85c; padding:12px; border-radius:10px;">再來一局 (重玩)</button>
                <button onclick="shareScore()" id="shareBtn" style="background:#007bff; padding:12px; border-radius:10px;">📤 分享戰績</button>
                <button onclick="closeModalOnly()" style="background:#6c757d; padding:12px; border-radius:10px;">結束遊戲 (看排行)</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto"></audio>
    <audio id="whackSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>
    <audio id="kingSound" src="https://actions.google.com/sounds/v1/cartoon/clime.ogg"></audio>
    <audio id="bombSound" src="https://actions.google.com/sounds/v1/weapons/explosion_distant.ogg"></audio>

    <div class="board">
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
    </div>

    <div class="game-footer">Made by Spm with Gemini</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCHeVKFnzHikj3eFckK_6TywjktzGrtxK8",
            authDomain: "whack-a-mole-game-spm.firebaseapp.com",
            projectId: "whack-a-mole-game-spm",
            storageBucket: "whack-a-mole-game-spm.firebasestorage.app",
            messagingSenderId: "992606804308",
            appId: "1:992606804308:web:ea2360efd506a1317310c1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const themeData = {
            easy: { 
                name: "草原區", 
                // 🌟 使用絕對穩定的 Unsplash 網址
                bg: "url('https://images.unsplash.com/photo-1547471080-7cb2cb6a5a36?q=80&w=1920&auto=format&fit=crop')", 
                color: "#4a2e15", ui: "#2e7d32", 
                mole: "url('https://api.iconify.design/fluent-emoji/hamster.svg')", 
                holeBg: "rgba(20, 60, 20, 0.8)", 
                music: "https://actions.google.com/sounds/v1/environment/crickets_and_insects.ogg", 
                goalScore: 10 
            },
            medium: { 
                name: "南極區", 
                bg: "url('https://images.unsplash.com/photo-1551244072-5d12893278ab?q=80&w=1920&auto=format&fit=crop')", 
                color: "#004a7c", ui: "#004a7c", 
                mole: "url('https://api.iconify.design/fluent-emoji/penguin.svg')", 
                holeBg: "rgba(0, 50, 100, 0.8)", 
                music: "https://actions.google.com/sounds/v1/weather/blizzard_wind.ogg", 
                goalScore: 25 
            },
            hell: { 
                name: "星際區", 
                bg: "url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=1920&auto=format&fit=crop')", 
                color: "#1a0033", ui: "#673ab7", 
                mole: "url('https://api.iconify.design/fluent-emoji/alien.svg')", 
                holeBg: "rgba(20, 0, 40, 0.8)", 
                music: "https://actions.google.com/sounds/v1/science_fiction/dark_sci_fi_drone.ogg", 
                goalScore: 50 
            }
        };

        let currentTheme = "easy", score = 0, timeLeft = 30, combo = 0;
        let normalHits = 0, kingHits = 0, bombHits = 0; 
        let timeUp = true, isPaused = false, isMusicPlaying = false; 
        let gameTimerInterval = null, peepTimeoutId = null;
        const bgMusic = document.getElementById('bgMusic');

        function updateUI(id, val) { const el = document.getElementById(id); if(el) el.innerText = val; }

        function applyTheme(key) {
            currentTheme = key;
            const t = themeData[key];
            const root = document.documentElement;
            root.style.setProperty('--bg-image', t.bg);
            root.style.setProperty('--bg-color', t.color);
            root.style.setProperty('--ui-color', t.ui);
            root.style.setProperty('--mole-img', t.mole);
            root.style.setProperty('--hole-bg', t.holeBg);
            updateUI('currentLevelName', t.name);
            updateUI('mainTitle', `宇宙獵人：${t.name} 🪐`);
            updateUI('goalScoreDisplay', t.goalScore);
            document.getElementById('startBtn').style.backgroundColor = t.ui;
            bgMusic.src = t.music;
            if (isMusicPlaying && !isPaused && !timeUp) bgMusic.play().catch(()=>{});
            loadLeaderboard(t.name);
        }

        function loadLeaderboard(lvl) {
            db.collection("scores").where("difficulty", "==", lvl).onSnapshot(snap => {
                const list = document.getElementById('leaderboardList');
                if(!list) return;
                let scoresArray = [];
                snap.forEach(doc => scoresArray.push(doc.data()));
                scoresArray.sort((a, b) => b.score - a.score);
                list.innerHTML = scoresArray.length === 0 ? "<li>尚無紀錄</li>" : "";
                for(let i=0; i < Math.min(10, scoresArray.length); i++) {
                    list.innerHTML += `<li>${scoresArray[i].name} : ${scoresArray[i].score} 分</li>`;
                }
            });
        }

        function toggleMusic() {
            isMusicPlaying = !isMusicPlaying;
            if(isMusicPlaying) { if (!isPaused && !timeUp) bgMusic.play().catch(()=>{}); } else { bgMusic.pause(); }
            const btn = document.getElementById('musicBtn');
            btn.innerText = isMusicPlaying ? "🎶 音效與音樂: 開" : "🔇 音效與音樂: 關";
            btn.style.backgroundColor = isMusicPlaying ? "#f0ad4e" : "#5bc0de";
        }

        function toggleGame() {
            const btn = document.getElementById('startBtn');
            const playerName = document.getElementById('playerName').value.trim();
            if (timeUp) {
                if (!playerName) return alert("獵人，出發前請先填寫您的姓名！");
                startGame(); btn.innerText = "暫停"; btn.classList.add('pausing');
                return;
            }
            if (!isPaused) {
                isPaused = true; clearInterval(gameTimerInterval); clearTimeout(peepTimeoutId);
                btn.innerText = "繼續"; btn.classList.remove('pausing');
                if (isMusicPlaying) bgMusic.pause();
                document.querySelectorAll('.hole.up').forEach(h => h.classList.remove('up'));
            } else {
                isPaused = false; startTimer(); peep();
                btn.innerText = "暫停"; btn.classList.add('pausing');
                if (isMusicPlaying) bgMusic.play().catch(()=>{});
            }
        }

        function startGame() {
            score = 0; timeLeft = 30; combo = 0; timeUp = false; isPaused = false;
            normalHits = 0; kingHits = 0; bombHits = 0; 
            updateUI('scoreDisplay', score); updateUI('timeDisplay', timeLeft); updateUI('comboDisplay', combo);
            document.getElementById('resultModal').classList.remove('show');
            document.querySelectorAll('input[name="difficulty"]').forEach(input => input.disabled = true);
            peep(); startTimer();
        }

        function startTimer() {
            gameTimerInterval = setInterval(() => {
                timeLeft--; updateUI('timeDisplay', timeLeft);
                if(timeLeft <= 0) { clearInterval(gameTimerInterval); timeUp = true; endGame(); }
            }, 1000);
        }

        function peep() {
            if(timeUp || isPaused) return; 
            const holes = Array.from(document.querySelectorAll('.hole'));
            const availableHoles = holes.filter(h => !h.classList.contains('up'));
            if(availableHoles.length === 0) { peepTimeoutId = setTimeout(() => { peep(); }, 200); return; }
            let numMoles = score > 40 ? 3 : (score > 15 ? 2 : 1);
            availableHoles.sort(() => 0.5 - Math.random());
            for(let i=0; i<Math.min(numMoles, availableHoles.length); i++) {
                const hole = availableHoles[i];
                const mole = hole.querySelector('.mole');
                mole.classList.remove('bomb', 'king');
                const rand = Math.random();
                if(rand < 0.15) mole.classList.add('bomb'); else if(rand < 0.25) mole.classList.add('king');
                hole.classList.add('up');
                setTimeout(() => { if(!isPaused) hole.classList.remove('up'); }, Math.max(450, 1200 - score * 10));
            }
            peepTimeoutId = setTimeout(() => { peep(); }, Math.max(350, 1000 - score * 8));
        }

        async function endGame() {
            const btn = document.getElementById('startBtn');
            btn.innerText = "開始探索"; btn.classList.remove('pausing');
            document.querySelectorAll('input[name="difficulty"]').forEach(input => input.disabled = false);
            bgMusic.pause();
            const name = document.getElementById('playerName').value.trim();
            const lvl = themeData[currentTheme].name;
            const goal = themeData[currentTheme].goalScore;
            updateUI('statNormal', normalHits); updateUI('statKing', kingHits);
            updateUI('statBomb', bombHits); updateUI('modalScore', score);
            const resultEl = document.getElementById('challengeResult');
            if (score >= goal) { resultEl.innerText = "🏆 挑戰完成！成功破關。"; resultEl.className = 'challenge-pass'; }
            else { resultEl.innerText = `❌ 挑戰失敗...還差 ${goal - score} 分。`; resultEl.className = 'challenge-fail'; }
            document.getElementById('resultModal').classList.add('show');
            try {
                const ref = db.collection("scores");
                const snap = await ref.where("difficulty", "==", lvl).get();
                let foundId = null, oldScore = -Infinity, allScores = [];
                snap.forEach(doc => {
                    let d = doc.data(); allScores.push(d.score);
                    if(d.name === name) { foundId = doc.id; oldScore = d.score; }
                });
                if (foundId) {
                    if (score > oldScore) { await ref.doc(foundId).update({ score, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); allScores[allScores.indexOf(oldScore)] = score; }
                } else {
                    await ref.add({ name, score, difficulty: lvl, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); allScores.push(score);
                }
                let rank = 1; allScores.forEach(s => { if(s > score) rank++; });
                updateUI('modalRank', rank);
            } catch (error) { updateUI('modalRank', "未能計算"); }
        }

        function shareScore() {
            const text = `🚀【跨宇宙獵人戰績】🚀\n獵人：${document.getElementById('playerName').value}\n宇宙：${themeData[currentTheme].name}\n得分：${score}分\n排名：第 ${document.getElementById('modalRank').innerText} 名\n來挑戰我：${window.location.href}`;
            navigator.clipboard.writeText(text).then(() => { document.getElementById('shareBtn').innerText = "✅ 戰績已複製！"; });
        }
        function closeModalRestart() { document.getElementById('resultModal').classList.remove('show'); toggleGame(); }
        function closeModalOnly() { document.getElementById('resultModal').classList.remove('show'); }

        document.querySelectorAll('.hole').forEach(h => {
            const whack = (e) => {
                if(!e.isTrusted || !h.classList.contains('up') || timeUp || isPaused) return; 
                const m = h.querySelector('.mole');
                if(m.classList.contains('bomb')) { 
                    score -= 5; combo=0; bombHits++; 
                    if(isMusicPlaying) document.getElementById('bombSound').play().catch(()=>{});
                } else if(m.classList.contains('king')) { 
                    score += 3; combo++; kingHits++; 
                    if(isMusicPlaying) document.getElementById('kingSound').play().catch(()=>{});
                } else { 
                    score++; combo++; normalHits++; 
                    if(isMusicPlaying) document.getElementById('whackSound').play().catch(()=>{});
                }
                h.classList.remove('up'); updateUI('scoreDisplay', score); updateUI('comboDisplay', combo);
            };
            h.addEventListener('mousedown', whack);
            h.addEventListener('touchstart', (e) => { e.preventDefault(); whack(e); }, {passive: false});
        });

        document.getElementsByName('difficulty').forEach(r => r.addEventListener('change', e => applyTheme(e.target.value)));
        applyTheme("easy"); 
    </script>
</body>
</html>
