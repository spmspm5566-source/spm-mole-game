<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>跨宇宙探險：數據大師動態版 🌌</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-image: url('grass.webp');
            --bg-fallback: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            --ui-color: #2e7d32;
            --hole-bg: rgba(30, 70, 30, 0.85);
            --hole-shadow: inset 0 15px 30px rgba(5, 30, 5, 0.95), 0 5px 10px rgba(0,0,0,0.4);
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            text-align: center; margin: 0; padding: env(safe-area-inset-top) 20px; 
            background-color: #2e7d32;
            background-image: var(--bg-image), var(--bg-fallback); 
            background-size: cover; background-position: center; background-attachment: fixed; 
            background-repeat: no-repeat; overflow-x: hidden; transition: background-image 0.5s ease; 
        }
        .top-section { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 950px; margin: 0 auto 20px auto; }
        .left-column, .right-column { display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; max-width: 420px; }
        h1 { color: #333; background: rgba(255, 255, 255, 0.9); display: inline-block; padding: 10px 30px; border-radius: 20px; font-size: 24px; border: 2px solid var(--ui-color); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .info-panel, .world-leaderboard, .rules-panel, .controls { background: rgba(255, 255, 255, 0.9); border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 90%; box-sizing: border-box; }
        .info-panel { padding: 15px; color: var(--ui-color); font-weight: bold; }
        .info-panel span { color: #d9534f; font-size: 22px; }
        .world-leaderboard { border: 3px solid var(--ui-color); padding: 10px 20px; height: 180px; overflow-y: auto; text-align: left; }
        .rules-panel { border: 3px solid var(--ui-color); padding: 10px 15px; text-align: left; font-size: 14px; font-weight: bold; }
        .controls { padding: 15px; height: 180px; display: flex; flex-direction: column; justify-content: center; }
        
        /* 🌟 盤面加入相對定位，讓分數特效能對齊 */
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 350px; margin: 20px auto; position: relative; }
        
        /* 🌟 洞口加入動態光影與背景色 */
        .hole { 
            aspect-ratio: 1/1; 
            background: var(--hole-bg); 
            border-radius: 50%; 
            position: relative; 
            overflow: hidden; 
            box-shadow: var(--hole-shadow); 
            border: 2px solid rgba(0,0,0,0.2);
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }
        
        .mole { width: 100%; height: 100%; position: absolute; left: 0; bottom: -100%; transition: bottom 0.1s ease-out; display: flex; align-items: center; justify-content: center; font-size: 55px; cursor: pointer; user-select: none; }
        .mole::after { content: attr(data-emoji); }
        .mole.king::before { content: '👑'; position: absolute; top: 5px; font-size: 22px; z-index: 2; }
        .hole.up .mole { bottom: 10%; }
        
        /* 結算畫面專用樣式 */
        #resultModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 340px; text-align: center; border: 4px solid var(--ui-color); }
        #resultModal.show { display: flex; }
        .stats-box { background: #f8f9fa; border-radius: 12px; padding: 15px; margin: 15px 0; text-align: left; border: 1px solid #dee2e6; }
        .stats-box p { margin: 8px 0; font-size: 16px; color: #495057; display: flex; justify-content: space-between; font-weight: bold; }
        .stats-box .total-score { color: #d9534f; font-size: 24px; border-top: 2px dashed #ccc; padding-top: 10px; margin-top: 10px; }
        .rank-badge { margin-bottom: 15px; font-size: 16px; color: #004a7c; font-weight: bold; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .modal-btn { width: 100%; padding: 12px; font-size: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white;}
        .game-footer { margin-top: 20px; color: white; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; display: inline-block; font-size: 12px;}
        
        /* 🌟 特效：噴發分數 */
        @keyframes scorePopUpFade {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
            10% { opacity: 1; transform: translate(-50%, -20px) scale(1.2); } 
            80% { opacity: 1; transform: translate(-50%, -60px) scale(1); } 
            100% { opacity: 0; transform: translate(-50%, -80px) scale(0.8); } 
        }
        .score-popup { position: absolute; pointer-events: none; font-weight: bold; font-size: 28px; color: #5cb85c; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); animation: scorePopUpFade 0.9s ease-out forwards; z-index: 100; white-space: nowrap; }
        .score-popup.negative { color: #d9534f; }
        .score-popup.king { color: #f0ad4e; font-size: 32px; }

        /* 🌟 特效：打地鼠閃爍發光 (結合環境光影) */
        @keyframes holeFlash {
            0% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.5), var(--hole-shadow); }
            50% { box-shadow: 0 0 30px var(--ui-color), var(--hole-shadow); }
            100% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.5), var(--hole-shadow); }
        }
        .hole.hit-flash { animation: holeFlash 0.3s ease-out; }
        
        /* 🌟 特效：炸彈爆炸盤面震動 */
        @keyframes boardShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-3px, 2px) rotate(-1deg); }
            20%, 40%, 60%, 80% { transform: translate(3px, -2px) rotate(1deg); }
        }
        .board.shake { animation: boardShake 0.4s 1; }
        
        /* 🌟 特效：洞口爆炸視覺偽元素粒子 */
        @keyframes bombExplosionParticle {
            0% { transform: scale(0); opacity: 0; box-shadow: 0 0 10px white, 0 0 20px orange, 0 0 30px red; }
            20% { opacity: 1; }
            100% { transform: scale(3); opacity: 0; box-shadow: 0 0 50px white, 0 0 100px yellow, 0 0 150px red; }
        }
        .hole.bomb-explode { overflow: visible; }
        .hole.bomb-explode::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; z-index: 5; animation: bombExplosionParticle 0.4s ease-out; }
        
        /* 🌟 特效：炸彈地鼠縮小消失 */
        @keyframes bombMoleFade {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.5); opacity: 0; }
        }
        .hole.bomb-explode .mole.bomb { animation: bombMoleFade 0.4s ease-out forwards; }
    </style>
</head>
<body>

    <h1 id="mainTitle">跨宇宙打地鼠 🪐</h1>

    <div class="top-section">
        <div class="left-column">
            <div class="info-panel">
                <div>分數: <span id="scoreDisplay">0</span> | 時間: <span id="timeDisplay">30</span> | 🔥 連擊: <span id="comboDisplay">0</span></div>
                <div style="font-size:14px; color:#5cb85c; margin-top:5px;">目標：打爆 <span id="goalScoreDisplay">35</span> 分</div>
            </div>
            <div class="world-leaderboard">
                <h3>🏆 <span id="currentLevelName">草原區</span> Top 10</h3>
                <ol id="leaderboardList" style="margin:5px 0; padding-left:25px;"><li>載入中...</li></ol>
            </div>
        </div>

        <div class="right-column">
            <div class="rules-panel">
                <p>🎯 一般: +1 | 👑 國王: +3 | 💣 炸彈: -5</p>
                <p style="font-size: 12px; color: #d9534f;">⚠️ 分數越高，地鼠速度越快！</p>
            </div>
            <div class="controls">
                <div style="margin-bottom:10px;">
                    <label><input type="radio" name="difficulty" value="easy" checked> 草原</label>
                    <label><input type="radio" name="difficulty" value="medium"> 南極</label>
                    <label><input type="radio" name="difficulty" value="hell"> 星際</label>
                </div>
                <div style="display:flex; justify-content:center; gap:5px;">
                    <input type="text" id="playerName" placeholder="獵人姓名" style="padding:8px; border-radius:8px; width:100px; border:1px solid #ccc;">
                    <button id="startBtn" style="background:var(--ui-color); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">開始探索</button>
                </div>
                <button id="musicBtn" style="background:#5bc0de; margin-top:10px; color:white; border:none; border-radius:8px; padding:5px; cursor:pointer; font-size: 12px;">🔇 音效: 關</button>
            </div>
        </div>
    </div>

    <div id="resultModal">
        <div class="modal-content">
            <h2 id="challengeTitle" style="margin:0; color:#1a0033;">🚀 探索結束 🚀</h2>
            <div id="challengeResult" style="margin:10px 0; font-weight:bold; font-size:18px;"></div>
            <div class="stats-box">
                <p>🎯 打到一般：<span><span id="statNormal">0</span> 隻</span></p>
                <p>👑 打到國王：<span><span id="statKing">0</span> 隻</span></p>
                <p>💣 誤觸炸彈：<span><span id="statBomb">0</span> 顆</span></p>
                <p class="total-score">總得分：<span id="modalScore">0</span></p>
            </div>
            <div class="rank-badge">全球排名：第 <span id="modalRank" style="color:#d9534f; font-size:20px;">計算中</span> 名</div>
            <div class="btn-group">
                <button class="modal-btn" onclick="location.reload()" style="background:#5cb85c;">再來一局 (重玩)</button>
                <button class="modal-btn" id="shareBtn" style="background:#007bff;">📤 分享戰績</button>
                <button class="modal-btn" onclick="document.getElementById('resultModal').classList.remove('show')" style="background:#6c757d;">結束遊戲 (看排行)</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop></audio>
    <audio id="hitSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="bombSound" src="https://assets.mixkit.co/active_storage/sfx/114/114-preview.mp3"></audio>

    <div class="board">
        <div class="hole"><div class="mole" data-emoji="🐹"></div></div>
        <div class="hole"><div class="mole" data-emoji="🐹"></div></div>
        <div class="hole"><div class="mole" data-emoji="🐹"></div></div>
        <div class="hole"><div class="mole" data-emoji="🐹"></div></div>
        <div class="hole"><div class="mole" data-emoji="🐹"></div></div>
        <div class="hole"><div class="mole" data-emoji="🐹"></div></div>
        <div class="hole"><div class="mole" data-emoji="🐹"></div></div>
        <div class="hole"><div class="mole" data-emoji="🐹"></div></div>
        <div class="hole"><div class="mole" data-emoji="🐹"></div></div>
    </div>

    <div class="game-footer">Made by Spm with Gemini | ⚡ 動態難度：開啟</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCHeVKFnzHikj3eFckK_6TywjktzGrtxK8",
            authDomain: "whack-a-mole-game-spm.firebaseapp.com",
            projectId: "whack-a-mole-game-spm",
            storageBucket: "whack-a-mole-game-spm.firebasestorage.app",
            messagingSenderId: "992606804308",
            appId: "1:992606804308:web:ea2360efd506a1317310c1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 🌟 帶有環境光影的主題資料設定
        const themeData = {
            easy: { 
                name: "草原區", bg: "grass.webp", emoji: "🐹", ui: "#2e7d32", goalScore: 35, baseSpeed: 1000,
                holeBg: "rgba(30, 70, 30, 0.85)", 
                holeShadow: "inset 0 15px 30px rgba(5, 30, 5, 0.95), 0 5px 10px rgba(0,0,0,0.4)" 
            },
            medium: { 
                name: "南極區", bg: "arctic.jpg", emoji: "🐧", ui: "#004a7c", goalScore: 45, baseSpeed: 850,
                holeBg: "rgba(20, 50, 90, 0.75)", 
                holeShadow: "inset 0 15px 30px rgba(5, 20, 50, 0.95), 0 0 20px rgba(150, 200, 255, 0.3)" 
            },
            hell: { 
                name: "星際區", bg: "space1.jpg", emoji: "👽", ui: "#673ab7", goalScore: 55, baseSpeed: 700,
                holeBg: "rgba(15, 5, 30, 0.85)", 
                holeShadow: "inset 0 15px 30px rgba(0, 0, 0, 0.95), 0 0 25px rgba(120, 60, 200, 0.5)" 
            }
        };

        let currentTheme = "easy", score = 0, timeLeft = 30, combo = 0, timeUp = true, isPaused = false, isMusicPlaying = false;
        let normalHits = 0, kingHits = 0, bombHits = 0;
        let gameTimerInterval = null, peepTimeoutId = null;

        function applyTheme(key) {
            currentTheme = key;
            const t = themeData[key];
            document.documentElement.style.setProperty('--bg-image', `url('${t.bg}')`);
            document.documentElement.style.setProperty('--ui-color', t.ui);
            document.documentElement.style.setProperty('--hole-bg', t.holeBg);
            document.documentElement.style.setProperty('--hole-shadow', t.holeShadow);
            
            document.getElementById('startBtn').style.backgroundColor = t.ui;
            document.getElementById('currentLevelName').innerText = t.name;
            document.getElementById('goalScoreDisplay').innerText = t.goalScore;
            document.querySelectorAll('.mole').forEach(m => m.setAttribute('data-emoji', t.emoji));
            loadLeaderboard(t.name);
        }

        function loadLeaderboard(lvl) {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = "<li>載入中...</li>";
            db.collection("scores").where("difficulty", "==", lvl).orderBy("score", "desc").limit(10).get()
                .then(snap => {
                    list.innerHTML = "";
                    if(snap.empty) { list.innerHTML = "<li>尚未有獵人紀錄</li>"; return; }
                    snap.forEach(doc => { list.innerHTML += `<li>${doc.data().name} : ${doc.data().score} 分</li>`; });
                }).catch(() => { list.innerHTML = "<li>排行榜連線失敗</li>"; });
        }

        function toggleGame() {
            const nameInput = document.getElementById('playerName');
            const name = nameInput.value.trim();
            if (timeUp) {
                if (!name) { alert("獵人請留名！"); return; }
                nameInput.disabled = true;
                document.querySelectorAll('input[name="difficulty"]').forEach(r => r.disabled = true);
                startGame();
            } else {
                isPaused = !isPaused;
                document.getElementById('startBtn').innerText = isPaused ? "繼續" : "暫停";
                if (!isPaused) { startTimer(); peep(); } 
                else { clearInterval(gameTimerInterval); clearTimeout(peepTimeoutId); }
            }
        }

        function startGame() {
            score = 0; timeLeft = 30; combo = 0; normalHits = 0; kingHits = 0; bombHits = 0; timeUp = false; isPaused = false;
            document.getElementById('scoreDisplay').innerText = "0";
            document.getElementById('timeDisplay').innerText = "30";
            document.getElementById('comboDisplay').innerText = "0";
            document.getElementById('startBtn').innerText = "暫停";
            document.getElementById('resultModal').classList.remove('show');
            startTimer(); peep();
        }

        function startTimer() {
            clearInterval(gameTimerInterval);
            gameTimerInterval = setInterval(() => {
                if (isPaused) return;
                timeLeft--;
                document.getElementById('timeDisplay').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(gameTimerInterval); timeUp = true; endGame(); }
            }, 1000);
        }

        function peep() {
            if(timeUp || isPaused) return;
            const speedLevel = Math.floor(score / 10);
            const currentPeepSpeed = Math.max(themeData[currentTheme].baseSpeed - (speedLevel * 120), 400);
            const showDuration = Math.max(currentPeepSpeed * 0.75, 350);

            const holes = Array.from(document.querySelectorAll('.hole'));
            const hole = holes[Math.floor(Math.random()*holes.length)];
            const mole = hole.querySelector('.mole');
            
            mole.classList.remove('bomb', 'king');
            const rand = Math.random();
            if(rand < 0.15) { mole.classList.add('bomb'); mole.setAttribute('data-emoji', '💣'); }
            else if(rand < 0.25) { mole.classList.add('king'); mole.setAttribute('data-emoji', themeData[currentTheme].emoji); }
            else { mole.setAttribute('data-emoji', themeData[currentTheme].emoji); }
            
            hole.classList.add('up');
            setTimeout(() => { if(!isPaused) hole.classList.remove('up'); }, showDuration);
            peepTimeoutId = setTimeout(peep, currentPeepSpeed);
        }

        function endGame() {
            document.getElementById('startBtn').innerText = "開始探索";
            document.getElementById('playerName').disabled = false;
            document.querySelectorAll('input[name="difficulty"]').forEach(r => r.disabled = false);
            
            document.getElementById('statNormal').innerText = normalHits;
            document.getElementById('statKing').innerText = kingHits;
            document.getElementById('statBomb').innerText = bombHits;
            document.getElementById('modalScore').innerText = score;
            
            const goal = themeData[currentTheme].goalScore;
            const resultText = document.getElementById('challengeResult');
            if (score >= goal) { resultText.innerHTML = "🏆 挑戰成功！"; resultText.style.color = "#2e7d32"; } 
            else { resultText.innerHTML = "❌ 挑戰失敗..."; resultText.style.color = "#d9534f"; }
            
            document.getElementById('resultModal').classList.add('show');
            
            const name = document.getElementById('playerName').value.trim();
            const levelName = themeData[currentTheme].name;

            if(score > 0) {
                db.collection("scores").add({ 
                    name, score, difficulty: levelName, timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                }).then(() => {
                    db.collection("scores").where("difficulty", "==", levelName).get().then(snap => {
                        let allScores = [];
                        snap.forEach(doc => allScores.push(doc.data().score));
                        let rank = 1; 
                        allScores.forEach(s => { if(s > score) rank++; });
                        document.getElementById('modalRank').innerText = rank;
                        loadLeaderboard(levelName);
                    });
                });
            } else { document.getElementById('modalRank').innerText = "未入榜"; }
        }

        // 🌟 產生噴發分數特效
        function showScoreEffect(x, y, text, type = 'normal') {
            const board = document.querySelector('.board');
            const popup = document.createElement('div');
            popup.classList.add('score-popup');
            
            if (type === 'negative') popup.classList.add('negative');
            if (type === 'king') popup.classList.add('king');
            
            popup.innerText = text;

            const boardRect = board.getBoundingClientRect();
            const relativeX = x - boardRect.left;
            const relativeY = y - boardRect.top;

            popup.style.left = `${relativeX}px`;
            popup.style.top = `${relativeY}px`;
            board.appendChild(popup);

            setTimeout(() => { popup.remove(); }, 900);
        }

        // 綁定事件
        document.getElementById('startBtn').addEventListener('click', toggleGame);
        
        document.getElementById('shareBtn').addEventListener('click', () => {
            const text = `🚀【跨宇宙獵人戰績】🚀\n獵人：${document.getElementById('playerName').value}\n宇宙：${themeData[currentTheme].name}\n得分：${score}分\n排名：第 ${document.getElementById('modalRank').innerText} 名\n來挑戰我吧！`;
            navigator.clipboard.writeText(text).then(() => { alert("✅ 戰績已複製，快去貼給朋友！"); });
        });

        document.getElementById('musicBtn').addEventListener('click', () => {
            isMusicPlaying = !isMusicPlaying;
            const m = document.getElementById('bgMusic');
            isMusicPlaying ? m.play().catch(() => {}) : m.pause();
            document.getElementById('musicBtn').innerText = isMusicPlaying ? "🔊 音效: 開" : "🔇 音效: 關";
            document.getElementById('musicBtn').style.background = isMusicPlaying ? "#f0ad4e" : "#5bc0de";
        });

        // 🌟 處理點擊與打擊邏輯
        document.querySelectorAll('.mole').forEach(m => {
            const handleHit = (e) => {
                const h = m.parentElement;
                if(timeUp || isPaused || !h.classList.contains('up')) return;
                
                // 獲取音效與盤面元件
                const hitAudio = document.getElementById('hitSound');
                const bombAudio = document.getElementById('bombSound');
                const board = document.querySelector('.board');

                // 獲取點擊/觸控座標
                let clickX, clickY;
                if (e.type === 'touchstart') {
                    clickX = e.touches[0].clientX; clickY = e.touches[0].clientY;
                } else {
                    clickX = e.clientX; clickY = e.clientY;
                }

                // 重設特效類，以防上一次動畫未完成
                h.classList.remove('bomb-explode', 'hit-flash');
                board.classList.remove('shake');

                let scoreChangeText = "";
                let scoreType = "normal";

                if(m.classList.contains('bomb')) { 
                    score -= 5; bombHits++; combo = 0;
                    scoreChangeText = "-5"; scoreType = "negative";
                    
                    bombAudio.currentTime = 0;
                    bombAudio.play().catch(() => {});
                    
                    // 觸發炸彈特效
                    h.classList.add('bomb-explode'); 
                    board.classList.add('shake'); 
                    
                    setTimeout(() => {
                        h.classList.remove('bomb-explode');
                        board.classList.remove('shake');
                    }, 400); 

                } else { 
                    if(m.classList.contains('king')) { 
                        score += 3; kingHits++; combo++; 
                        scoreChangeText = "+3分 👑"; scoreType = "king";
                    } else { 
                        score += 1; normalHits++; combo++; 
                        scoreChangeText = "+1分"; scoreType = "normal";
                    }
                    
                    hitAudio.currentTime = 0;
                    hitAudio.play().catch(() => {});
                    
                    // 觸發打擊特效
                    h.classList.add('hit-flash'); 
                    setTimeout(() => { h.classList.remove('hit-flash'); }, 300);
                }
                
                showScoreEffect(clickX, clickY, scoreChangeText, scoreType);
                h.classList.remove('up');
                
                document.getElementById('scoreDisplay').innerText = score;
                document.getElementById('comboDisplay').innerText = combo;
            };
            
            m.addEventListener('mousedown', (e) => handleHit(e));
            m.addEventListener('touchstart', (e) => { e.preventDefault(); handleHit(e); });
        });

        document.getElementsByName('difficulty').forEach(r => {
            r.addEventListener('change', (e) => applyTheme(e.target.value));
        });

        window.onload = () => applyTheme("easy");
    </script>
</body>
</html>
