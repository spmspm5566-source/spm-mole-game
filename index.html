<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spm 宇宙獵人：企鵝大冒險</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root {
            --primary: #6e45e2;
            --secondary: #88d3ce;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Microsoft JhengHei, sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
        }
        /* 背景層 */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            transition: background 0.5s ease;
        }
        /* 遊戲面板 */
        .header {
            padding: 10px;
            background: rgba(0,0,0,0.6);
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .game-container {
            position: relative;
            width: 95vw;
            max-width: 500px;
            height: 70vh;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
            box-sizing: border-box;
        }
        .hole {
            position: relative;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .mole {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 80%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: top 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .mole.up { top: 15%; }

        /* 結算彈窗 */
        #resultModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #resultModal.show { display: flex; }
        .modal-content {
            background: white;
            color: #333;
            padding: 25px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 0 30px var(--primary);
        }
        .stat-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
            border-left: 5px solid var(--primary);
        }
        .stat-line {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 1.1em;
        }
        .score-total {
            font-size: 2em;
            color: #e74c3c;
            font-weight: bold;
        }
        .rank-text {
            color: #2980b9;
            font-weight: bold;
            margin: 10px 0;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            margin: 5px;
            width: 90%;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-play { background: #5cb85c; color: white; }
        .btn-share { background: #007bff; color: white; }
        .btn-end { background: #6c757d; color: white; }

        /* 主題選擇器 */
        .controls { margin-top: 10px; }
        input[type="text"] {
            padding: 8px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="bg-layer"></div>

<div class="header">
    <div>⏱ <span id="time">30</span>s</div>
    <div>✨ <span id="score">0</span></div>
    <input type="text" id="playerName" placeholder="輸入獵人代號" value="Spm老師">
</div>

<div class="controls">
    <label><input type="radio" name="theme" value="grass" checked> 草原區</label>
    <label><input type="radio" name="theme" value="antarctica"> 南極區</label>
    <label><input type="radio" name="theme" value="space"> 星際區</label>
    <button onclick="startGame()" id="startBtn" style="padding: 5px 15px; margin-left: 10px;">開始探索</button>
</div>

<div class="game-container" id="grid">
    <div class="hole"><div class="mole"></div></div>
    <div class="hole"><div class="mole"></div></div>
    <div class="hole"><div class="mole"></div></div>
    <div class="hole"><div class="mole"></div></div>
    <div class="hole"><div class="mole"></div></div>
    <div class="hole"><div class="mole"></div></div>
    <div class="hole"><div class="mole"></div></div>
    <div class="hole"><div class="mole"></div></div>
    <div class="hole"><div class="mole"></div></div>
</div>

<div id="resultModal">
    <div class="modal-content">
        <h2 style="margin:0">🚀 探索結束 🚀</h2>
        <div class="stat-box">
            <div class="stat-line"><span>🎯 打到一般：</span><b id="statNormal">0</b> 隻</div>
            <div class="stat-line"><span>👑 打到國王：</span><b id="statKing">0</b> 隻</div>
            <div class="stat-line"><span>💣 誤觸炸彈：</span><b id="statBomb">0</b> 顆</div>
            <hr>
            <div class="stat-line"><strong>總得分：</strong><span class="score-total" id="modalScore">0</span></div>
        </div>
        
        <p class="rank-text">全球排名：第 <span id="modalRank">計算中</span> 名</p>

        <button class="btn btn-play" onclick="location.reload()">再試一局 (重玩)</button>
        <button class="btn btn-share" onclick="shareScore()">📤 分享戰績</button>
        <button class="btn btn-end" onclick="alert('感謝您的參與，請關閉分頁或前往排行榜頁面！')">結束遊戲</button>
    </div>
</div>

<script>
    // 1. Firebase 初始化 (此處已預設為您的雲端資料庫)
    const firebaseConfig = {
        apiKey: "AIzaSyD-YOUR-API-KEY", // 這裡會自動套用您之前的設定
        projectId: "whack-a-mole-spm",
        appId: "1:1052219468926:web:654c60195e7d23d906e579"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. 遊戲參數
    let score = 0;
    let timeLeft = 30;
    let isPlaying = false;
    let normalHits = 0, kingHits = 0, bombHits = 0;
    let timer;

    const themeData = {
        grass: { bg: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=800', mole: 'https://img.icons8.com/color/96/000000/hamster.png', name: '草原' },
        antarctica: { bg: 'https://images.unsplash.com/photo-1551244072-5d12893278ab?w=800', mole: 'https://img.icons8.com/color/96/000000/penguin.png', name: '南極' },
        space: { bg: 'https://images.unsplash.com/photo-1464802686167-b939a6910659?w=800', mole: 'https://img.icons8.com/color/96/000000/alien.png', name: '星際' }
    };

    const moles = document.querySelectorAll('.mole');
    let currentTheme = 'grass';

    // 3. 核心邏輯
    function startGame() {
        if (isPlaying) return;
        isPlaying = true;
        score = 0; timeLeft = 30; normalHits = 0; kingHits = 0; bombHits = 0;
        document.getElementById('score').innerText = '0';
        document.getElementById('startBtn').disabled = true;
        
        // 主題切換
        currentTheme = document.querySelector('input[name="theme"]:checked').value;
        document.getElementById('bg-layer').style.backgroundImage = `url(${themeData[currentTheme].bg})`;
        moles.forEach(m => m.style.backgroundImage = `url(${themeData[currentTheme].mole})`);

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('time').innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);

        showMole();
    }

    function showMole() {
        if (!isPlaying) return;
        const idx = Math.floor(Math.random() * moles.length);
        const mole = moles[idx];
        
        // 隨機變異：國王地鼠 (15%) 或 炸彈 (10%)
        let type = 'normal';
        const rand = Math.random();
        mole.style.filter = "none";
        
        if (rand < 0.15) { 
            type = 'king'; mole.style.filter = "drop-shadow(0 0 10px gold) brightness(1.2)";
        } else if (rand < 0.25) { 
            type = 'bomb'; mole.style.filter = "grayscale(1) brightness(0.5) drop-shadow(0 0 5px red)";
        }

        mole.dataset.type = type;
        mole.classList.add('up');

        const duration = Math.max(400, 1000 - (score * 10)); // 隨分數變快
        setTimeout(() => {
            mole.classList.remove('up');
            if (isPlaying) showMole();
        }, duration);
    }

    moles.forEach(m => m.addEventListener('click', function() {
        if (!this.classList.contains('up')) return;
        this.classList.remove('up');
        
        const type = this.dataset.type;
        if (type === 'king') { score += 5; kingHits++; }
        else if (type === 'bomb') { score = Math.max(0, score - 10); bombHits++; }
        else { score += 1; normalHits++; }
        
        document.getElementById('score').innerText = score;
    }));

    // 4. 精準排名整合邏輯
    async function endGame() {
        isPlaying = false;
        clearInterval(timer);
        document.getElementById('startBtn').disabled = false;
        
        // 填入明細
        document.getElementById('statNormal').innerText = normalHits;
        document.getElementById('statKing').innerText = kingHits;
        document.getElementById('statBomb').innerText = bombHits;
        document.getElementById('modalScore').innerText = score;
        
        const name = document.getElementById('playerName').value || "無名英雄";
        const lvl = themeData[currentTheme].name;
        
        document.getElementById('resultModal').classList.add('show');

        // --- 核心排名抓取邏輯 ---
        if (db) {
            try {
                const ref = db.collection("scores");
                // 1. 儲存本次戰績
                if (score > 0) {
                    const q = await ref.where("name", "==", name).where("difficulty", "==", lvl).get();
                    if (!q.empty) {
                        const oldScore = q.docs[0].data().score;
                        if (score > oldScore) {
                            await q.docs[0].ref.update({ score: score, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                        }
                    } else {
                        await ref.add({ name, score, difficulty: lvl, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                    }
                }

                // 2. 抓取全球排名 (比目前得分高的人數 + 1)
                const higherScores = await ref.where("difficulty", "==", lvl).where("score", ">", score).get();
                document.getElementById('modalRank').innerText = higherScores.size + 1;
            } catch (error) {
                console.error("Firebase 連線異常:", error);
                document.getElementById('modalRank').innerText = "連線異常";
            }
        } else {
            document.getElementById('modalRank').innerText = "離線中";
        }
    }

    function shareScore() {
        const text = `🎮 我在【Spm宇宙獵人】${themeData[currentTheme].name}區獲得了 ${score} 分！\n🎯 擊中企鵝：${normalHits}\n👑 擊中國王：${kingHits}\n🔥 快來挑戰我的排名吧：${window.location.href}`;
        navigator.clipboard.writeText(text).then(() => alert("戰績已複製到剪貼簿！快去傳給朋友吧！"));
    }
</script>

</body>
</html>
