<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>跨宇宙探險：戰績排行版 🌌</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5cb85c">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-image: url('https://images.unsplash.com/photo-1551604538-4e50d880579e?q=80&w=1920&auto=format&fit=crop');
            --ui-color: #004a7c;
            --hole-bg: #e0f7fa;
            --mole-img: url('https://api.iconify.design/fluent-emoji/penguin.svg');
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; text-align: center; margin: 0; padding: env(safe-area-inset-top) 20px 20px 20px; background-image: var(--bg-image); background-size: cover; background-position: center; background-attachment: fixed; overflow-x: hidden; transition: 0.5s; }
        
        /* 統一資訊面板 */
        .info-panel, .controls { background: rgba(255, 255, 255, 0.9); display: inline-block; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 15px; width: 90%; max-width: 400px; color: var(--ui-color); font-weight: bold; }
        
        .world-leaderboard { background: rgba(255, 255, 255, 0.9); border: 2px solid var(--ui-color); border-radius: 12px; display: inline-block; padding: 10px 20px; min-width: 280px; max-height: 180px; overflow-y: auto; margin-bottom: 10px; text-align: left; }
        
        /* 遊戲地洞 */
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 350px; margin: 15px auto; }
        .hole { aspect-ratio: 1/1; background: var(--hole-bg); border-radius: 50%; position: relative; overflow: hidden; box-shadow: inset 0 8px 12px rgba(0,0,0,0.3); }
        .mole { width: 80%; height: 80%; position: absolute; left: 10%; bottom: -100%; transition: bottom 0.1s ease-out; background-image: var(--mole-img); background-size: 70% 70%; background-repeat: no-repeat; background-position: center 10px; }
        .mole.king::before { content: '👑'; position: absolute; top: -22px; left: 20%; font-size: 24px; }
        .mole.bomb { background-image: url('https://api.iconify.design/fluent-emoji/bomb.svg'); }
        .hole.up .mole { bottom: 0; }

        /* 🌟 核心：結算彈窗樣式 */
        #resultModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #resultModal.show { display: flex; }
        
        .final-score { font-size: 50px; color: #d9534f; font-weight: bold; margin: 10px 0; }
        .rank-badge { background: #fff9c4; padding: 10px; border-radius: 12px; border: 1px dashed #fbc02d; margin: 15px 0; font-size: 18px; }
        
        .modal-btn { width: 100%; padding: 12px; font-size: 18px; font-weight: bold; border-radius: 10px; border: none; margin-top: 10px; cursor: pointer; }
        .btn-restart { background: #5cb85c; color: white; }
        .btn-exit { background: #777; color: white; }

        .game-footer { margin-top: 20px; color: white; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; display: inline-block; }
    </style>
</head>
<body>

    <h1 id="mainTitle">跨宇宙打地鼠 🌌</h1>
    
    <div class="world-leaderboard">
        <h3 style="margin:0; text-align:center;">🏆 <span id="currentLevelName">南極區</span> Top 10</h3>
        <ol id="leaderboardList" style="margin:10px 0; padding-left:30px;"></ol>
    </div>

    <div class="info-panel">
        分數: <span id="score">0</span> | 時間: <span id="time">30</span> | 🔥 連擊: <span id="combo">0</span>
    </div>

    <div class="controls">
        <div class="difficulty-panel">
            <label><input type="radio" name="difficulty" value="easy"> 草原區</label>
            <label><input type="radio" name="difficulty" value="medium" checked> 南極區</label>
            <label><input type="radio" name="difficulty" value="hell"> 星際區</label>
        </div>
        <input type="text" id="playerName" placeholder="獵人代號" value="挑戰者">
        <button onclick="startGame()" style="background:var(--ui-color); color:white;">開始探索</button>
        <button id="musicBtn" onclick="toggleMusic()">🎵 音樂: 關</button>
    </div>

    <div id="resultModal">
        <div class="modal-content">
            <h2 style="margin:0;">🚀 探索結束 🚀</h2>
            <p style="margin:5px 0; color:#666;">【<span id="modalDiff">南極區</span>】</p>
            
            <p class="final-score" id="modalScore">0</p>
            
            <div class="rank-badge">
                🌍 全宇宙排名：第 <span id="modalRank" style="color:#d9534f; font-size:24px;">?</span> 名<br>
                <small>擊敗了 <span id="modalPercent">0</span>% 的獵人</small>
            </div>

            <div id="modalBadges" style="margin-bottom:15px; display:flex; flex-wrap:wrap; justify-content:center; gap:5px;"></div>

            <button class="modal-btn btn-restart" onclick="closeModalRestart()">再次躍遷 (重玩)</button>
            <button class="modal-btn btn-exit" onclick="closeModalOnly()">結束並查看排行</button>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto"></audio>
    <audio id="whackSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>
    <audio id="kingSound" src="https://actions.google.com/sounds/v1/cartoon/clime.ogg"></audio>

    <div class="board">
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
    </div>

    <div class="game-footer">Made by Spm with Gemini</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCHeVKFnzHikj3eFckK_6TywjktzGrtxK8",
            authDomain: "whack-a-mole-game-spm.firebaseapp.com",
            projectId: "whack-a-mole-game-spm",
            storageBucket: "whack-a-mole-game-spm.firebasestorage.app",
            messagingSenderId: "992606804308",
            appId: "1:992606804308:web:ea2360efd506a1317310c1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const themeData = {
            easy: { name: "草原區", bg: "url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1200')", ui: "#5cb85c", mole: "url('https://api.iconify.design/fluent-emoji/hamster.svg')", music: "https://raw.githubusercontent.com/Aris-T2/Whack-A-Mole/master/sounds/bgm.mp3" },
            medium: { name: "南極區", bg: "url('https://images.unsplash.com/photo-1551604538-4e50d880579e?w=1200')", ui: "#004a7c", mole: "url('https://api.iconify.design/fluent-emoji/penguin.svg')", music: "https://actions.google.com/sounds/v1/science_fiction/low_fi_action_loop.ogg" },
            hell: { name: "星際區", bg: "url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1200')", ui: "#673ab7", mole: "url('https://api.iconify.design/fluent-emoji/alien-monster.svg')", music: "https://actions.google.com/sounds/v1/science_fiction/dark_sci_fi_drone.ogg" }
        };

        let currentTheme = "medium", score = 0, timeLeft = 30, timeUp = false, combo = 0, maxCombo = 0, kingHits = 0, bombHits = 0, isMusicPlaying = false;
        const bgMusic = document.getElementById('bgMusic');

        function applyTheme(key) {
            currentTheme = key;
            const t = themeData[key];
            const root = document.documentElement;
            root.style.setProperty('--bg-image', t.bg);
            root.style.setProperty('--ui-color', t.ui);
            root.style.setProperty('--mole-img', t.mole);
            document.getElementById('currentLevelName').textContent = t.name;
            document.getElementById('mainTitle').textContent = `跨宇宙獵人：${t.name}`;
            bgMusic.src = t.music;
            if (isMusicPlaying) bgMusic.play().catch(()=>{});
            loadLeaderboard(t.name);
        }

        function loadLeaderboard(lvl) {
            db.collection("scores").where("difficulty", "==", lvl).orderBy("score", "desc").limit(10).onSnapshot(snap => {
                const list = document.getElementById('leaderboardList');
                list.innerHTML = snap.empty ? "<li>尚無紀錄</li>" : "";
                snap.forEach(doc => { list.innerHTML += `<li>${doc.data().name}: ${doc.data().score}</li>`; });
            });
        }

        function toggleMusic() {
            isMusicPlaying ? bgMusic.pause() : bgMusic.play().catch(()=>{});
            isMusicPlaying = !isMusicPlaying;
            document.getElementById('musicBtn').innerText = isMusicPlaying ? "🎶 音樂: 開" : "🎵 音樂: 關";
        }

        function startGame() {
            if(!document.getElementById('playerName').value) return alert("請輸入獵人代號");
            score = 0; timeLeft = 30; combo = 0; maxCombo = 0; kingHits = 0; bombHits = 0; timeUp = false;
            document.getElementById('score').innerText = "0";
            document.getElementById('time').innerText = "30";
            document.getElementById('combo').innerText = "0";
            document.getElementById('resultModal').classList.remove('show');
            peep();
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(timer); timeUp = true; endGame(); }
            }, 1000);
        }

        function peep() {
            const hole = document.querySelectorAll('.hole')[Math.floor(Math.random()*9)];
            const mole = hole.querySelector('.mole');
            mole.classList.remove('bomb', 'king');
            const rand = Math.random();
            if(rand < 0.15) mole.classList.add('bomb');
            else if(rand < 0.3) mole.classList.add('king');
            hole.classList.add('up');
            const time = Math.max(200, 800 - score * 10);
            setTimeout(() => { hole.classList.remove('up'); if(!timeUp) peep(); }, time);
        }

        // --- 🚀 重點：結算與排名邏輯 ---
        async function endGame() {
            const name = document.getElementById('playerName').value;
            const lvl = themeData[currentTheme].name;
            document.getElementById('modalScore').innerText = score;
            document.getElementById('modalDiff').innerText = lvl;

            if (score > 0) {
                const ref = db.collection("scores");
                const q = await ref.where("name", "==", name).where("difficulty", "==", lvl).get();
                if (!q.empty) {
                    if (score > q.docs[0].data().score) await q.docs[0].ref.update({ score, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                } else {
                    await ref.add({ name, score, difficulty: lvl, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                }

                const higher = await ref.where("difficulty", "==", lvl).where("score", ">", score).get();
                const total = await ref.where("difficulty", "==", lvl).get();
                document.getElementById('modalRank').innerText = higher.size + 1;
                document.getElementById('modalPercent').innerText = total.size > 1 ? Math.floor(((total.size - (higher.size + 1)) / total.size) * 100) : 100;
            }
            document.getElementById('resultModal').classList.add('show');
        }

        function closeModalRestart() { startGame(); }
        function closeModalOnly() { document.getElementById('resultModal').classList.remove('show'); }

        // 打擊邏輯
        document.querySelectorAll('.hole').forEach(h => {
            const whack = (e) => {
                if(!e.isTrusted || !h.classList.contains('up')) return;
                const m = h.querySelector('.mole');
                if(m.classList.contains('bomb')) { score = Math.max(0, score-5); combo=0; bombHits++; }
                else if(m.classList.contains('king')) { score += 3; combo++; kingHits++; document.getElementById('kingSound').play(); }
                else { score++; combo++; document.getElementById('whackSound').play(); }
                if(combo > maxCombo) maxCombo = combo;
                h.classList.remove('up');
                document.getElementById('score').innerText = score;
                document.getElementById('combo').innerText = combo;
            };
            h.addEventListener('mousedown', whack);
            h.addEventListener('touchstart', (e) => { e.preventDefault(); whack(e); });
        });

        document.getElementsByName('difficulty').forEach(r => r.addEventListener('change', e => applyTheme(e.target.value)));
        applyTheme("medium");
    </script>
</body>
</html>
