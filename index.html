<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>跨宇宙探險：數據大師版 🌌</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5cb85c">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-image: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1920&auto=format&fit=crop');
            --bg-color: #004a7c;
            --ui-color: #004a7c;
            --hole-bg: rgba(255, 255, 255, 0.2);
            --mole-img: url('https://api.iconify.design/fluent-emoji/penguin.svg');
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            text-align: center; margin: 0; padding: env(safe-area-inset-top) 10px 20px 10px; 
            background-color: var(--bg-color); 
            background-image: var(--bg-image); 
            background-size: cover; background-position: center; background-attachment: fixed; 
            background-repeat: no-repeat;
            overflow-x: hidden;
        }
        
        .top-section {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            max-width: 900px; margin: 0 auto 15px auto;
        }
        .left-column, .right-column {
            display: flex; flex-direction: column; gap: 10px; align-items: center;
            width: 100%; max-width: 420px;
        }

        h1 { color: #333; background: rgba(255, 255, 255, 0.95); padding: 10px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 22px; border: 2px solid var(--ui-color); }
        
        .world-leaderboard { background: rgba(255, 255, 255, 0.95); border: 2px solid var(--ui-color); border-radius: 15px; padding: 10px; width: 95%; max-height: 150px; overflow-y: auto; text-align: left; }
        .world-leaderboard h3 { margin: 0 0 5px 0; text-align: center; color: var(--ui-color); font-size: 16px; border-bottom: 1px solid #eee; }
        
        .info-panel, .controls { background: rgba(255, 255, 255, 0.95); padding: 10px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 95%; color: var(--ui-color); font-weight: bold; }
        .info-panel span { color: #d9534f; font-size: 20px; }
        
        .difficulty-panel { margin-bottom: 8px; display: flex; justify-content: center; gap: 8px; font-size: 14px; }
        input[type="text"] { padding: 8px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; width: 90px; text-align: center; }
        button { padding: 8px 12px; font-size: 15px; cursor: pointer; border: none; border-radius: 8px; transition: 0.2s; font-weight: bold; }
        
        /* 遊戲地洞：確保圓形且不重疊 */
        .board { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 15px; max-width: 360px; margin: 10px auto; 
            padding: 15px; background: rgba(0,0,0,0.3); border-radius: 20px;
        }
        .hole { 
            aspect-ratio: 1/1; background: var(--hole-bg); border-radius: 50%; 
            position: relative; overflow: hidden; box-shadow: inset 0 8px 15px rgba(0,0,0,0.5); 
            border: 2px solid rgba(255,255,255,0.3); 
        }
        .mole { 
            width: 75%; height: 75%; position: absolute; left: 12.5%; bottom: -100%; 
            transition: bottom 0.1s ease-out; background-image: var(--mole-img); 
            background-size: contain; background-repeat: no-repeat; background-position: center; 
        }
        .mole.king::before { content: '👑'; position: absolute; top: -15px; left: 25%; font-size: 20px; }
        .mole.bomb { background-image: url('https://api.iconify.design/fluent-emoji/bomb.svg') !important; }
        .hole.up .mole { bottom: 10%; }

        /* 結算彈窗設計 */
        #resultModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; 
        }
        #resultModal.show { display: flex; }
        .modal-content { 
            background: white; padding: 20px; border-radius: 20px; text-align: center; 
            width: 85%; max-width: 340px; border: 4px solid var(--ui-color); 
        }
        
        .stats-box { background: #f8f9fa; border-radius: 12px; padding: 12px; margin: 10px 0; text-align: left; }
        .stats-box p { margin: 5px 0; font-size: 15px; color: #444; display: flex; justify-content: space-between; font-weight: bold; }
        .stats-box .total-score { color: #d9534f; font-size: 22px; border-top: 2px dashed #ccc; padding-top: 8px; margin-top: 8px; }
        
        .rank-badge { background: #e3f2fd; padding: 10px; border-radius: 12px; border: 1px dashed #2196f3; margin-bottom: 15px; color: #004a7c; font-weight: bold; }
        
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .modal-btn { width: 100%; padding: 12px; font-size: 17px; border-radius: 10px; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-restart { background: #5cb85c; }
        .btn-share { background: #007bff; }
        .btn-exit { background: #6c757d; }

        .game-footer { margin-top: 15px; color: white; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-size: 11px; }
    </style>
</head>
<body>

    <div class="top-section">
        <div class="left-column">
            <h1 id="mainTitle">跨宇宙打地鼠 🪐</h1>
            <div class="world-leaderboard">
                <h3>🏆 <span id="currentLevelName">南極區</span> Top 10</h3>
                <ol id="leaderboardList" style="margin:5px 0; padding-left:25px; font-size:14px;"><li>連接中...</li></ol>
            </div>
        </div>

        <div class="right-column">
            <div class="info-panel">
                分數: <span id="scoreDisplay">0</span> | 
                時間: <span id="timeDisplay">30</span> | 
                🔥 連擊: <span id="comboDisplay">0</span>
            </div>

            <div class="controls">
                <div class="difficulty-panel">
                    <label><input type="radio" name="difficulty" value="easy"> 草原區</label>
                    <label><input type="radio" name="difficulty" value="medium" checked> 南極區</label>
                    <label><input type="radio" name="difficulty" value="hell"> 星際區</label>
                </div>
                <input type="text" id="playerName" placeholder="獵人代號" value="Spm老師">
                <button onclick="startGame()" style="background:var(--ui-color); color:white;">開始探索</button>
                <button id="musicBtn" onclick="toggleMusic()" style="background:#5bc0de; color:white;">🎵 音樂: 關</button>
            </div>
        </div>
    </div>

    <div id="resultModal">
        <div class="modal-content">
            <h2 style="margin:0; color:var(--ui-color);">🚀 探索結束 🚀</h2>
            <p style="margin:5px 0; color:#666; font-weight:bold;">【<span id="modalDiff">南極區</span>】</p>
            
            <div class="stats-box">
                <p>🎯 一般地鼠：<span id="statNormal">0</span></p>
                <p>👑 國王地鼠：<span id="statKing">0</span></p>
                <p>💣 誤觸炸彈：<span id="statBomb">0</span></p>
                <p class="total-score">最終得分：<span id="modalScore">0</span></p>
            </div>
            
            <div class="rank-badge">
                🌍 全球排名：第 <span id="modalRank">?</span> 名<br>
                <small>超越了 <span id="modalPercent">0</span>% 的獵人</small>
            </div>

            <div class="btn-group">
                <button class="modal-btn btn-restart" onclick="closeModalRestart()">再來一局 (重玩)</button>
                <button class="modal-btn btn-share" id="shareBtn" onclick="shareScore()">📤 分享戰績</button>
                <button class="modal-btn btn-exit" onclick="closeModalOnly()">結束遊戲 (看排行)</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto"></audio>
    <audio id="whackSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>
    <audio id="kingSound" src="https://actions.google.com/sounds/v1/cartoon/clime.ogg"></audio>
    <audio id="bombSound" src="https://actions.google.com/sounds/v1/trident/explosive_fail.ogg"></audio>

    <div class="board">
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
    </div>

    <div class="game-footer">Design for Spm Class | Data Master Edition</div>

    <script>
        // Firebase 設定與初始化
        const firebaseConfig = {
            apiKey: "AIzaSyCHeVKFnzHikj3eFckK_6TywjktzGrtxK8",
            authDomain: "whack-a-mole-game-spm.firebaseapp.com",
            projectId: "whack-a-mole-game-spm",
            storageBucket: "whack-a-mole-game-spm.firebasestorage.app",
            messagingSenderId: "992606804308",
            appId: "1:992606804308:web:ea2360efd506a1317310c1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const themeData = {
            easy: { name: "草原區", bg: "url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1920')", color: "#2e7d32", ui: "#2e7d32", mole: "url('https://api.iconify.design/fluent-emoji/hamster.svg')", holeBg: "rgba(46, 125, 50, 0.3)", music: "https://raw.githubusercontent.com/Aris-T2/Whack-A-Mole/master/sounds/bgm.mp3" },
            medium: { name: "南極區", bg: "url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1920')", color: "#004a7c", ui: "#004a7c", mole: "url('https://api.iconify.design/fluent-emoji/penguin.svg')", holeBg: "rgba(0, 74, 124, 0.2)", music: "https://actions.google.com/sounds/v1/science_fiction/low_fi_action_loop.ogg" },
            hell: { name: "星際區", bg: "url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=1920')", color: "#1a0033", ui: "#673ab7", mole: "url('https://api.iconify.design/fluent-emoji/alien-monster.svg')", holeBg: "rgba(103, 58, 183, 0.2)", music: "https://actions.google.com/sounds/v1/science_fiction/dark_sci_fi_drone.ogg" }
        };

        let currentTheme = "medium", score = 0, timeLeft = 30, timeUp = true, combo = 0;
        let normalHits = 0, kingHits = 0, bombHits = 0, isMusicPlaying = false;
        const bgMusic = document.getElementById('bgMusic');

        function updateUI(id, val) { const el = document.getElementById(id); if(el) el.innerText = val; }

        function applyTheme(key) {
            currentTheme = key;
            const t = themeData[key];
            const root = document.documentElement;
            root.style.setProperty('--bg-image', t.bg);
            root.style.setProperty('--bg-color', t.color);
            root.style.setProperty('--ui-color', t.ui);
            root.style.setProperty('--mole-img', t.mole);
            root.style.setProperty('--hole-bg', t.holeBg);
            updateUI('currentLevelName', t.name);
            updateUI('mainTitle', `宇宙獵人：${t.name} 🪐`);
            bgMusic.src = t.music;
            if (isMusicPlaying) bgMusic.play().catch(()=>{});
            loadLeaderboard(t.name);
        }

        function loadLeaderboard(lvl) {
            db.collection("scores").where("difficulty", "==", lvl).orderBy("score", "desc").limit(10).onSnapshot(snap => {
                const list = document.getElementById('leaderboardList');
                if(!list) return;
                list.innerHTML = snap.empty ? "<li>尚無紀錄</li>" : "";
                snap.forEach(doc => { list.innerHTML += `<li>${doc.data().name} : ${doc.data().score} 分</li>`; });
            });
        }

        function toggleMusic() {
            if(isMusicPlaying) { bgMusic.pause(); } else { bgMusic.play().catch(()=>{}); }
            isMusicPlaying = !isMusicPlaying;
            const btn = document.getElementById('musicBtn');
            btn.innerText = isMusicPlaying ? "🎶 音樂: 開" : "🎵 音樂: 關";
            btn.style.background = isMusicPlaying ? "#f0ad4e" : "#5bc0de";
        }

        function startGame() {
            if(!document.getElementById('playerName').value) return alert("請輸入獵人代號");
            score = 0; timeLeft = 30; combo = 0; timeUp = false;
            normalHits = 0; kingHits = 0; bombHits = 0; 
            updateUI('scoreDisplay', score); updateUI('timeDisplay', timeLeft); updateUI('comboDisplay', combo);
            document.getElementById('resultModal').classList.remove('show');
            peep();
            const timer = setInterval(() => {
                timeLeft--; updateUI('timeDisplay', timeLeft);
                if(timeLeft <= 0) { clearInterval(timer); timeUp = true; endGame(); }
            }, 1000);
        }

        function peep() {
            if(timeUp) return;
            const holes = Array.from(document.querySelectorAll('.hole'));
            const available = holes.filter(h => !h.classList.contains('up'));
            if(available.length === 0) return setTimeout(() => peep(), 100);

            let num = score > 40 ? 3 : (score > 15 ? 2 : 1);
            available.sort(() => 0.5 - Math.random());

            for(let i=0; i < Math.min(num, available.length); i++) {
                const hole = available[i];
                const mole = hole.querySelector('.mole');
                mole.classList.remove('bomb', 'king');
                const rand = Math.random();
                if(rand < 0.15) mole.classList.add('bomb');
                else if(rand < 0.30) mole.classList.add('king');
                
                hole.classList.add('up');
                setTimeout(() => { hole.classList.remove('up'); }, Math.max(500, 1100 - score * 10));
            }
            setTimeout(() => peep(), Math.max(400, 900 - score * 8));
        }

        async function endGame() {
            const name = document.getElementById('playerName').value;
            const lvl = themeData[currentTheme].name;
            updateUI('statNormal', normalHits); updateUI('statKing', kingHits);
            updateUI('statBomb', bombHits); updateUI('modalScore', score);
            updateUI('modalDiff', lvl);

            if (score >= 0) {
                const ref = db.collection("scores");
                const q = await ref.where("name", "==", name).where("difficulty", "==", lvl).get();
                if (!q.empty) {
                    if (score > q.docs[0].data().score) await q.docs[0].ref.update({ score, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                } else {
                    await ref.add({ name, score, difficulty: lvl, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                }
                const higher = await ref.where("difficulty", "==", lvl).where("score", ">", score).get();
                const total = await ref.where("difficulty", "==", lvl).get();
                updateUI('modalRank', higher.size + 1);
                updateUI('modalPercent', Math.floor(((total.size - (higher.size + 1)) / total.size) * 100));
            }
            document.getElementById('resultModal').classList.add('show');
        }

        function shareScore() {
            const text = `🚀【跨宇宙獵人戰績】🚀\n\n獵人：${document.getElementById('playerName').value}\n宇宙：${document.getElementById('modalDiff').innerText}\n🎯 一般地鼠：${normalHits}\n👑 國王地鼠：${kingHits}\n💣 誤觸炸彈：${bombHits}\n\n🏆 總得分：${score} 分\n🌍 全球排名：第 ${document.getElementById('modalRank').innerText} 名\n\n快來跟我一起探險：${window.location.href}`;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('shareBtn').innerText = "✅ 戰績已複製！";
            });
        }

        function closeModalRestart() { document.getElementById('resultModal').classList.remove('show'); startGame(); }
        function closeModalOnly() { document.getElementById('resultModal').classList.remove('show'); }

        document.querySelectorAll('.hole').forEach(h => {
            const whack = (e) => {
                if(!h.classList.contains('up') || timeUp) return;
                const m = h.querySelector('.mole');
                if(m.classList.contains('bomb')) { 
                    score = Math.max(0, score-10); combo=0; bombHits++; 
                    document.getElementById('bombSound').play();
                } else if(m.classList.contains('king')) { 
                    score += 5; combo++; kingHits++; 
                    document.getElementById('kingSound').play(); 
                } else { 
                    score++; combo++; normalHits++; 
                    document.getElementById('whackSound').play(); 
                }
                h.classList.remove('up');
                updateUI('scoreDisplay', score); updateUI('comboDisplay', combo);
            };
            h.addEventListener('touchstart', (e) => { e.preventDefault(); whack(e); });
            h.addEventListener('mousedown', whack);
        });

        document.getElementsByName('difficulty').forEach(r => r.addEventListener('change', e => applyTheme(e.target.value)));
        applyTheme("medium");
    </script>
</body>
</html>
